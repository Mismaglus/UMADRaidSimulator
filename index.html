<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UMAD 机制模拟器</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0b0d12;font-family:system-ui,"Microsoft YaHei",sans-serif;color:#cde;}
  #gl,#overlay{position:fixed;inset:0;display:block;}
  #overlay{pointer-events:none;}
  #ui{position:fixed;left:10px;top:10px;z-index:10;background:rgba(18,22,30,.85);
      padding:10px 12px;border-radius:8px;font-size:13px;max-width:250px;line-height:1.5;
      box-shadow:0 2px 12px rgba(0,0,0,.4);}
  #ui h3{margin:0 0 6px;font-size:14px;color:#fff;font-weight:600;}
  #ui label{display:inline-block;margin:2px 6px 2px 0;cursor:pointer;}
  #ui select,#ui button{font-size:13px;margin-top:4px;background:#222a36;color:#cde;border:1px solid #3a4555;border-radius:5px;padding:3px 6px;cursor:pointer;}
  #ui .row{margin-top:7px;border-top:1px solid #2a3340;padding-top:7px;}
  #ui .hint{color:#8aa;font-size:11px;margin-top:7px;}
  .sw{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle;}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<canvas id="overlay"></canvas>
<div id="ui">
  <h3>UMAD 机制模拟器 <span id="ver" style="font-size:11px;font-weight:400;color:#6c7;vertical-align:middle"></span></h3>
  <div>机制：
    <select id="mechSel"></select>
  </div>
  <div>我的职能：
    <select id="roleSel">
      <option value="OB">OB（观察·8人自动）</option>
      <option>MT</option><option>ST</option><option>H1</option><option>H2</option>
      <option>D1</option><option>D2</option><option>D3</option><option>D4</option>
    </select>
  </div>
  <div id="mechOpts"></div>
  <div>移动：
    <select id="moveSel">
      <option value="legacy">传统（角色面朝移动方向·S转身后退）</option>
      <option value="standard">现代（角色面朝镜头·S原地倒退）</option>
    </select>
  </div>
  <div class="row">
    <button id="startBtn">开始/重置</button>
    <button id="pauseBtn">暂停</button>
    <button id="stepBtn">单步</button>
  </div>
  <div class="row">
    <label><input type="checkbox" id="randSeed" checked>随机种子</label>
    种子<input id="seedInp" type="number" value="1" style="width:58px">
    <button id="reseedBtn">随机</button>
    <label style="margin-left:6px"><input type="checkbox" id="pofChk" checked>失败暂停</label>
    <div style="margin-top:4px">速度
      <select id="tsSel"><option value="1">1×</option><option value="0.5">0.5×</option><option value="0.25">0.25×</option><option value="2">2×</option></select>
    </div>
  </div>
  <div class="row">AOE 贴花预览(空闲时)：
    <div>
      <label><input type="checkbox" data-d="tower">塔</label>
      <label><input type="checkbox" data-d="cone">扇形</label>
      <label><input type="checkbox" data-d="spread">钢铁</label>
      <label><input type="checkbox" data-d="stack">分摊</label>
      <label><input type="checkbox" data-d="halfcleave">半场刀</label>
      <label><input type="checkbox" data-d="charge">冲锋圈</label>
    </div>
  </div>
  <div class="row">
    <button id="resetCam">重置视角</button>
    <button id="followBtn">跟随：关</button>
  </div>
  <div class="row" style="font-size:11px">
    <span class="sw" style="background:#3b6fe0"></span>MT/ST
    <span class="sw" style="background:#36b25a"></span>H1/H2
    <span class="sw" style="background:#d33a3a"></span>D1-4
    <span class="sw" style="background:#f2f2f2"></span>BOSS
  </div>
  <div class="hint">WASD / 左摇杆 移动 · 拖拽 / 右摇杆 转视角 · 滚轮 / LT·RT 缩放<br>手柄：A 开始 · Y 跟随 · View 重置视角 · Menu 暂停</div>
</div>

<!-- ?v=N 缓存戳：改了 js 就 +1，确保浏览器/Pages 拿到新文件 -->
<script src="js/core/engine.js?v=16"></script>
<script src="js/core/render.js?v=16"></script>
<script src="js/core/host.js?v=16"></script>
<script src="js/core/sim.js?v=16"></script>
<script src="js/mechanics/p2_forsaken.js?v=16"></script>
<script src="js/mechanics/p3_yiyun.js?v=16"></script>
<script src="js/boot.js?v=16"></script>
</body>
</html>
