<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UMAD 机制模拟器</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0b0d12;font-family:system-ui,"Microsoft YaHei",sans-serif;color:#cde;}
  #gl,#overlay{position:fixed;inset:0;display:block;}
  #overlay{pointer-events:none;}
  #ui{position:fixed;left:10px;top:10px;z-index:10;background:rgba(18,22,30,.85);
      padding:10px 12px;border-radius:8px;font-size:13px;max-width:250px;line-height:1.5;
      box-shadow:0 2px 12px rgba(0,0,0,.4);}
  #ui h3{margin:0 0 6px;font-size:14px;color:#fff;font-weight:600;}
  #ui label{display:inline-block;margin:2px 6px 2px 0;cursor:pointer;}
  #ui select,#ui button{font-size:13px;margin-top:4px;background:#222a36;color:#cde;border:1px solid #3a4555;border-radius:5px;padding:3px 6px;cursor:pointer;}
  #ui .row{margin-top:7px;border-top:1px solid #2a3340;padding-top:7px;}
  #ui .hint{color:#8aa;font-size:11px;margin-top:7px;}
  .sw{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle;}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<canvas id="overlay"></canvas>
<div id="ui">
  <h3>UMAD 机制模拟器</h3>
  <div>机制：
    <select id="mechSel"></select>
  </div>
  <div>我的职能：
    <select id="roleSel">
      <option value="OB">OB（观察·8人自动）</option>
      <option>MT</option><option>ST</option><option>H1</option><option>H2</option>
      <option>D1</option><option>D2</option><option>D3</option><option>D4</option>
    </select>
  </div>
  <div id="mechOpts"></div>
  <div>移动：
    <select id="moveSel">
      <option value="legacy">传统（角色面朝移动方向·S转身后退）</option>
      <option value="standard">现代（角色面朝镜头·S原地倒退）</option>
    </select>
  </div>
  <div class="row">
    <button id="startBtn">开始/重置</button>
    <button id="pauseBtn">暂停</button>
    <button id="stepBtn">单步</button>
  </div>
  <div class="row">
    <label><input type="checkbox" id="randSeed" checked>随机种子</label>
    种子<input id="seedInp" type="number" value="1" style="width:58px">
    <button id="reseedBtn">随机</button>
    <label style="margin-left:6px"><input type="checkbox" id="pofChk" checked>失败暂停</label>
    <div style="margin-top:4px">速度
      <select id="tsSel"><option value="1">1×</option><option value="0.5">0.5×</option><option value="0.25">0.25×</option><option value="2">2×</option></select>
    </div>
  </div>
  <div class="row">AOE 贴花预览(空闲时)：
    <div>
      <label><input type="checkbox" data-d="tower">塔</label>
      <label><input type="checkbox" data-d="cone">扇形</label>
      <label><input type="checkbox" data-d="spread">钢铁</label>
      <label><input type="checkbox" data-d="stack">分摊</label>
      <label><input type="checkbox" data-d="halfcleave">半场刀</label>
      <label><input type="checkbox" data-d="charge">冲锋圈</label>
    </div>
  </div>
  <div class="row">
    <button id="resetCam">重置视角</button>
    <button id="followBtn">跟随：关</button>
  </div>
  <div class="row" style="font-size:11px">
    <span class="sw" style="background:#3b6fe0"></span>MT/ST
    <span class="sw" style="background:#36b25a"></span>H1/H2
    <span class="sw" style="background:#d33a3a"></span>D1-4
    <span class="sw" style="background:#f2f2f2"></span>BOSS
  </div>
  <div class="hint">WASD / 左摇杆 移动 · 拖拽 / 右摇杆 转视角 · 滚轮 / LT·RT 缩放<br>手柄：A 开始 · Y 跟随 · View 重置视角 · Menu 暂停</div>
</div>

<script>
"use strict";
/* =====================================================================
   Forsaken 脑死法 3D 模拟器 — 单文件 / 零依赖 / WebGL
   阶段1：渲染器 + 框架（场地、轨道相机、圆柱+文字、玩家走位、AOE 预览）
   后续阶段2 在 //==ENGINE== 处接入完整机制与 NPC 自动走位。
   ===================================================================== */

/* ==0 UTIL== 数学（手写 vec3 / mat4，列主序 column-major，WebGL 约定） */
const TAU = Math.PI * 2;
const clamp = (v,a,b)=> v<a?a : v>b?b : v;
const d2r = d=> d*Math.PI/180;
const v3sub=(a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]];
const v3dot=(a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2];
const v3cross=(a,b)=>[a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]];
const v3norm=a=>{const l=Math.hypot(a[0],a[1],a[2])||1; return [a[0]/l,a[1]/l,a[2]/l];};

function mPerspective(fovy,aspect,near,far){
  const f=1/Math.tan(fovy/2), nf=1/(near-far), o=new Float32Array(16);
  o[0]=f/aspect; o[5]=f; o[10]=(far+near)*nf; o[11]=-1; o[14]=2*far*near*nf; return o;
}
function mLookAt(eye,center,up){
  const z=v3norm(v3sub(eye,center)), x=v3norm(v3cross(up,z)), y=v3cross(z,x), o=new Float32Array(16);
  o[0]=x[0];o[1]=y[0];o[2]=z[0];o[3]=0;
  o[4]=x[1];o[5]=y[1];o[6]=z[1];o[7]=0;
  o[8]=x[2];o[9]=y[2];o[10]=z[2];o[11]=0;
  o[12]=-v3dot(x,eye);o[13]=-v3dot(y,eye);o[14]=-v3dot(z,eye);o[15]=1; return o;
}
function mMul(a,b){
  const o=new Float32Array(16);
  for(let c=0;c<4;c++)for(let r=0;r<4;r++)
    o[c*4+r]=a[r]*b[c*4]+a[4+r]*b[c*4+1]+a[8+r]*b[c*4+2]+a[12+r]*b[c*4+3];
  return o;
}
/* model = T(tx,ty,tz) * RotateY(ry) * Scale(sx,sy,sz) */
function mModel(tx,ty,tz,ry,sx,sy,sz){
  const c=Math.cos(ry), s=Math.sin(ry), o=new Float32Array(16);
  o[0]=c*sx; o[2]=-s*sx; o[5]=sy; o[8]=s*sz; o[10]=c*sz; o[12]=tx; o[13]=ty; o[14]=tz; o[15]=1; return o;
}
const MID = mModel(0,0,0,0,1,1,1); // identity (for static meshes already in world units)
/* 世界点 -> 屏幕(CSS px)，用于头顶文字。VP 列主序。 */
function projHead(VP,x,y,z){
  const cx=VP[0]*x+VP[4]*y+VP[8]*z+VP[12];
  const cy=VP[1]*x+VP[5]*y+VP[9]*z+VP[13];
  const cw=VP[3]*x+VP[7]*y+VP[11]*z+VP[15];
  if(cw<=1e-3) return null;
  return [(cx/cw*0.5+0.5)*cssW, (1-(cy/cw*0.5+0.5))*cssH];
}

/* ==1 CONFIG== */
const R = 20;                       // 竞技场半径(m) — 默认/Forsaken
let ARENA_R = R;                    // 当前机制的场地半径(由 SIM.select 设置；地面/网格/边环/场地标点都按它缩放)
const CAM = {fov:50, near:0.1, far:500};
const cam = {yaw:Math.PI, pitch:d2r(55), dist:38, target:[0,0,0]};
const UP = [0,1,0];
const SPEED = 6.5;                  // 玩家移动 m/s
const COL = {
  ground:[0.13,0.15,0.19], grid:[0.32,0.38,0.46],
  MT:[0.231,0.435,0.878], ST:[0.231,0.435,0.878],
  H1:[0.211,0.698,0.353], H2:[0.211,0.698,0.353],
  D1:[0.827,0.227,0.227], D2:[0.827,0.227,0.227], D3:[0.827,0.227,0.227], D4:[0.827,0.227,0.227],
  BOSS:[0.95,0.95,0.95], self:[1.0,0.85,0.2]
};
const roleColor = r => COL[r] || [0.7,0.7,0.7];
/* 贴花样式：mesh 名 + 颜色 + 透明度 + 微抬高度(防 z-fighting) */
const DECAL_STYLE = {
  tower:     {mesh:'annulus', color:[0.95,0.95,0.80], alpha:0.55, y:0.020, thin:false},
  spread:    {mesh:'circle',  color:[0.95,0.80,0.20], alpha:0.33, y:0.030},
  stack:     {mesh:'circle',  color:[0.30,0.70,1.00], alpha:0.33, y:0.030},
  cone:      {mesh:'cone',    color:[1.00,0.55,0.10], alpha:0.42, y:0.035},
  donut:     {mesh:'donut',   color:[0.40,0.62,1.00], alpha:0.34, y:0.028},   // 环形AOE(中心安全)；颜色随属性传入
  halfcleave:{mesh:'half',    color:[0.70,0.20,0.90], alpha:0.30, y:0.015},
  charge:    {mesh:'annulus', color:[1.00,0.85,0.20], alpha:0.60, y:0.040, thin:true},
  bossring:  {mesh:'annulus', color:[0.50,0.55,0.68], alpha:0.50, y:0.014, thin:true}   // boss 身位环
};
/* 场地标点：A 正北(红)，顺时针 1·B·2·C·3·D·4（正点+斜点） */
const WAYMARKS=(()=>{
  const rW=R*0.92, red=[0.95,0.27,0.27], yel=[0.96,0.82,0.22], cyan=[0.30,0.72,1.0], pur=[0.80,0.42,0.96];
  const defs=[['A',0,red],['1',45,red],['B',90,yel],['2',135,yel],['C',180,cyan],['3',225,cyan],['D',270,pur],['4',315,pur]];
  // 注意：默认镜头(南向北)会左右镜像，故 X 取负，使其在玩家视角里"顺时针"。dir=单位方向，绘制时×ARENA_R*0.92(适配不同场地)
  return defs.map(d=>{ const t=d2r(d[1]); return {label:d[0], color:d[2], dir:[-Math.sin(t), Math.cos(t)]}; });
})();

/* ==RENDER setup== WebGL 上下文、着色器、网格 */
const glc = document.getElementById('gl');
const gl = glc.getContext('webgl', {antialias:true, alpha:false});
const oc = document.getElementById('overlay');
const octx = oc.getContext('2d');
let cssW=1, cssH=1;

const VS = `attribute vec3 aPos; attribute float aShade;
  uniform mat4 uMVP; varying float vShade;
  void main(){ gl_Position=uMVP*vec4(aPos,1.0); vShade=aShade; }`;
const FS = `precision mediump float; uniform vec3 uColor; uniform float uAlpha;
  varying float vShade;
  void main(){ gl_FragColor=vec4(uColor*vShade, uAlpha); }`;
function compile(type,src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) throw gl.getShaderInfoLog(s); return s; }
const prog = gl.createProgram();
gl.attachShader(prog,compile(gl.VERTEX_SHADER,VS));
gl.attachShader(prog,compile(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(prog); gl.useProgram(prog);
const aPos=gl.getAttribLocation(prog,'aPos'), aShade=gl.getAttribLocation(prog,'aShade');
const uMVP=gl.getUniformLocation(prog,'uMVP'), uColor=gl.getUniformLocation(prog,'uColor'), uAlpha=gl.getUniformLocation(prog,'uAlpha');
gl.enableVertexAttribArray(aPos); gl.enableVertexAttribArray(aShade);

function mkMesh(arr,mode){
  const buf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(arr),gl.STATIC_DRAW);
  return {buf, count:arr.length/4, mode};
}
function drawMesh(mesh,MVP,color,alpha){
  gl.bindBuffer(gl.ARRAY_BUFFER,mesh.buf);
  gl.vertexAttribPointer(aPos,3,gl.FLOAT,false,16,0);
  gl.vertexAttribPointer(aShade,1,gl.FLOAT,false,16,12);
  gl.uniformMatrix4fv(uMVP,false,MVP);
  gl.uniform3fv(uColor,color); gl.uniform1f(uAlpha,alpha);
  gl.drawArrays(mesh.mode,0,mesh.count);
}

/* ==3 geometry builders== 每顶点 [x,y,z,shade] */
function buildCylinder(N){
  const v=[]; const sb=0.55, st=1.0;
  for(let i=0;i<N;i++){ const a0=i/N*TAU,a1=(i+1)/N*TAU;
    const c0=Math.cos(a0),s0=Math.sin(a0),c1=Math.cos(a1),s1=Math.sin(a1);
    v.push(c0,0,s0,sb, c1,0,s1,sb, c1,1,s1,st);
    v.push(c0,0,s0,sb, c1,1,s1,st, c0,1,s0,st);
  }
  for(let i=0;i<N;i++){ const a0=i/N*TAU,a1=(i+1)/N*TAU; // top cap
    v.push(0,1,0,1.1, Math.cos(a0),1,Math.sin(a0),1.0, Math.cos(a1),1,Math.sin(a1),1.0); }
  return v;
}
function buildDisc(rad,N,y,sh){
  const v=[]; for(let i=0;i<N;i++){ const a0=i/N*TAU,a1=(i+1)/N*TAU;
    v.push(0,y,0,sh, rad*Math.cos(a0),y,rad*Math.sin(a0),sh, rad*Math.cos(a1),y,rad*Math.sin(a1),sh); }
  return v;
}
function buildSector(half,N){ // 扇形：apex 在原点，绕 +Z 张开 ±half
  const v=[]; for(let i=0;i<N;i++){
    const t0=-half+2*half*i/N, t1=-half+2*half*(i+1)/N;
    v.push(0,0,0,1, Math.sin(t0),0,Math.cos(t0),1, Math.sin(t1),0,Math.cos(t1),1); }
  return v;
}
function buildAnnulus(ri,N){
  const v=[]; for(let i=0;i<N;i++){ const a0=i/N*TAU,a1=(i+1)/N*TAU;
    const c0=Math.cos(a0),s0=Math.sin(a0),c1=Math.cos(a1),s1=Math.sin(a1);
    v.push(ri*c0,0,ri*s0,1, c0,0,s0,1, c1,0,s1,1);
    v.push(ri*c0,0,ri*s0,1, c1,0,s1,1, ri*c1,0,ri*s1,1); }
  return v;
}
function buildSphere(rings,segs){   // 单位球(用于踩塔倒计时光球)
  const v=[], P=(ph,th)=>[Math.sin(ph)*Math.cos(th), Math.cos(ph), Math.sin(ph)*Math.sin(th)];
  for(let i=0;i<rings;i++){ const p0=Math.PI*i/rings, p1=Math.PI*(i+1)/rings;
    for(let j=0;j<segs;j++){ const t0=TAU*j/segs, t1=TAU*(j+1)/segs;
      const a=P(p0,t0),b=P(p1,t0),c=P(p1,t1),e=P(p0,t1), sh=0.8;
      v.push(a[0],a[1],a[2],sh, b[0],b[1],b[2],sh, c[0],c[1],c[2],sh);
      v.push(a[0],a[1],a[2],sh, c[0],c[1],c[2],sh, e[0],e[1],e[2],sh); } }
  return v;
}
function buildGrid(rad){
  const v=[], y=0.012, sh=1;
  for(let ring=1;ring<=4;ring++){ const rr=rad*ring/4, seg=72;
    for(let i=0;i<seg;i++){ const a0=i/seg*TAU,a1=(i+1)/seg*TAU;
      v.push(rr*Math.cos(a0),y,rr*Math.sin(a0),sh, rr*Math.cos(a1),y,rr*Math.sin(a1),sh); } }
  for(let k=0;k<8;k++){ const a=k/8*TAU; v.push(0,y,0,sh, rad*Math.cos(a),y,rad*Math.sin(a),sh); }
  return v;
}
const meshes = {
  cyl:     mkMesh(buildCylinder(24), gl.TRIANGLES),
  disc:    mkMesh(buildDisc(1,80,0,1), gl.TRIANGLES),    // 单位圆盘 → 按 ARENA_R 缩放(支持不同机制场地大小)
  grid:    mkMesh(buildGrid(1), gl.LINES),               // 单位网格 → 按 ARENA_R 缩放
  circle:  mkMesh(buildDisc(1,48,0,1), gl.TRIANGLES),
  cone:    mkMesh(buildSector(d2r(45),18), gl.TRIANGLES), // 90° = ±45°
  half:    mkMesh(buildSector(d2r(90),28), gl.TRIANGLES), // 180° = ±90°
  annulus: mkMesh(buildAnnulus(0.88,48), gl.TRIANGLES),   // 细环(塔/冲锋/boss环)
  donut:   mkMesh(buildAnnulus(0.34,48), gl.TRIANGLES),   // 甜甜圈/环形AOE(中心安全, 内0.34外1.0)
  sphere:  mkMesh(buildSphere(10,14), gl.TRIANGLES)
};

/* ==Scene API== 渲染无关边界：引擎(阶段2)只通过这些方法驱动渲染 */
const Scene = (()=>{
  const actors=new Map(); let decals=[]; let hud=[];
  return {
    addActor(a){ actors.set(a.id,a); },
    updateActor(id,p){ const a=actors.get(id); if(a) Object.assign(a,p); },
    removeActor(id){ actors.delete(id); },
    get(id){ return actors.get(id); },
    list(){ return [...actors.values()]; },
    setDecals(d){ decals=d||[]; },
    getDecals(){ return decals; },
    setHUD(lines){ hud=lines||[]; },
    getHUD(){ return hud; },
    setCamera(c){ Object.assign(cam,c); },
    onTick:null
  };
})();

/* ==camera / picking== */
function camEye(){
  const cp=Math.cos(cam.pitch), sp=Math.sin(cam.pitch);
  return [cam.target[0]+cam.dist*cp*Math.sin(cam.yaw),
          cam.target[1]+cam.dist*sp,
          cam.target[2]+cam.dist*cp*Math.cos(cam.yaw)];
}
// 复用 lookAt 的相机基，保证点选/移动与渲染一致
function camBasis(){
  const eye=camEye();
  const z=v3norm(v3sub(eye,cam.target));   // 向后
  const x=v3norm(v3cross(UP,z));           // 屏幕右
  const y=v3cross(z,x);                    // 屏幕上
  const f=v3norm(v3sub(cam.target,eye));   // 视线向前
  return {eye,x,y,f};
}
// (FF14 用 WASD，无点地走位；故不做地面拾取)

/* ==9 MOVEMENT== 玩家（被控职能）走位 */
const keys={}; let humanRole='OB'; let follow=false; let moveMode='legacy'; let playerFacing=0;   // 'OB'=观察；moveMode 两种模式移动方向都跟镜头(W=镜头前方)，区别只在角色"朝向"：legacy传统=朝移动方向 / standard现代=朝镜头
/* ==击退(共享)== 任何机制都可触发；被击退中锁玩家输入，由 tickKB 平滑移动(玩家与NPC通用) */
const KB={};   // role → {fx,fz,tx,tz,t,dur}
function startKBv(role,vx,vz,dur){ const a=Scene.get(role); if(!a) return; let tx=a.pos[0]+vx, tz=a.pos[1]+vz; const m=Math.hypot(tx,tz); if(m>ARENA_R-0.6){ const s=(ARENA_R-0.6)/m; tx*=s; tz*=s; } KB[role]={fx:a.pos[0],fz:a.pos[1],tx,tz,t:0,dur:dur||0.45}; }   // 按向量击退(终点超出场地则贴边)
function clearKB(){ for(const k in KB) delete KB[k]; }
function tickKB(dt){ for(const r in KB){ const k=KB[r], a=Scene.get(r); k.t+=dt; const u=Math.min(1,k.t/k.dur); if(a){ a.pos[0]=k.fx+(k.tx-k.fx)*u; a.pos[1]=k.fz+(k.tz-k.fz)*u; } if(u>=1) delete KB[r]; } }
addEventListener('keydown',e=>{ keys[e.key.toLowerCase()]=true; });
addEventListener('keyup',  e=>{ keys[e.key.toLowerCase()]=false; });

/* ==9b GAMEPAD== 手柄适配（XInput/标准映射）：左摇杆移动 · 右摇杆转视角 · LT/RT缩放 · A开始 · Y跟随 · View重置视角 · Menu暂停 */
const GP={ index:null, deadzone:0.18, lookSpeed:2.8, zoomSpeed:1.6, move:[0,0], prev:{} };   // move=[右,前]，供 updatePlayer 消费
addEventListener('gamepadconnected',   e=>{ GP.index=e.gamepad.index; });
addEventListener('gamepaddisconnected',e=>{ if(GP.index===e.gamepad.index) GP.index=null; });
function gpActive(){
  const pads=navigator.getGamepads?navigator.getGamepads():[];
  if(GP.index!=null && pads[GP.index]) return pads[GP.index];
  for(let i=0;i<pads.length;i++) if(pads[i]){ GP.index=i; return pads[i]; }
  return null;
}
const gpDz=v=> Math.abs(v)<GP.deadzone ? 0 : (v-Math.sign(v)*GP.deadzone)/(1-GP.deadzone);   // 死区 + 重映射，保留模拟量
function gpEdge(gp,i){ const now=!!(gp.buttons[i]&&gp.buttons[i].pressed), was=!!GP.prev[i]; GP.prev[i]=now; return now&&!was; }
/* 每帧轮询手柄：视角/缩放/按键独立于 updatePlayer（OB 观察模式无玩家也能用手柄转视角） */
function pollGamepad(dt){
  GP.move[0]=GP.move[1]=0;
  const gp=gpActive(); if(!gp) return;
  const ax=gp.axes;
  GP.move[0]=gpDz(ax[0]||0);              // 左摇杆 X → 右
  GP.move[1]=-gpDz(ax[1]||0);             // 左摇杆 Y(上为负) → 前
  const lookX=gpDz(ax[2]||0), lookY=gpDz(ax[3]||0);   // 右摇杆转视角（与拖拽同向）
  if(lookX) cam.yaw  -= lookX*GP.lookSpeed*dt;
  if(lookY) cam.pitch = clamp(cam.pitch + lookY*GP.lookSpeed*dt, d2r(12), d2r(85));
  const lt=gp.buttons[6]?gp.buttons[6].value:0, rt=gp.buttons[7]?gp.buttons[7].value:0;   // LT 拉远 / RT 拉近（与滚轮同款指数缩放）
  if(lt||rt) cam.dist=clamp(cam.dist*Math.exp((lt-rt)*GP.zoomSpeed*dt), 12, 90);
  if(gpEdge(gp,0)) $('startBtn').click();    // A：开始/重置
  if(gpEdge(gp,3)) $('followBtn').click();   // Y：切换跟随
  if(gpEdge(gp,8)){ cam.yaw=Math.PI; cam.pitch=d2r(55); cam.dist=38; if(!follow) cam.target=[0,0,0]; }   // View/Back：重置视角
  if(gpEdge(gp,9)) $('pauseBtn').click();     // Menu/Start：暂停/继续
}

function updatePlayer(dt){
  const me=Scene.get(humanRole); if(!me) return;
  if(KB[humanRole]){ if(follow){ cam.target[0]=me.pos[0]; cam.target[2]=me.pos[1]; } return; }   // 被击退中：锁输入(由 tickKB 移动)
  const {x,f}=camBasis();                                    // 两种模式移动方向都跟镜头：W=镜头前方
  const fg=v3norm([f[0],0,f[2]]), rg=v3norm([x[0],0,x[2]]);
  let mx=0,mz=0;
  if(keys['w']){mx+=fg[0];mz+=fg[2];} if(keys['s']){mx-=fg[0];mz-=fg[2];}
  if(keys['d']){mx+=rg[0];mz+=rg[2];} if(keys['a']){mx-=rg[0];mz-=rg[2];}
  if(GP.move[0]||GP.move[1]){ mx+=rg[0]*GP.move[0]+fg[0]*GP.move[1]; mz+=rg[2]*GP.move[0]+fg[2]*GP.move[1]; }   // 手柄左摇杆（保留推杆幅度）
  if(mx||mz){ const l=Math.hypot(mx,mz), k=l>1?1/l:1;   // 键盘=满速；手柄推杆幅度→对应速度（不强制归一化）
    me.pos[0]+=mx*k*SPEED*dt; me.pos[1]+=mz*k*SPEED*dt;
    if(moveMode==='legacy') playerFacing=Math.atan2(mx,mz); }   // 传统：面朝移动方向(按S=转身后退、A/D=转身侧跑)
  if(moveMode==='standard') playerFacing=Math.atan2(fg[0],fg[2]);   // 现代：永远面朝镜头前方(按S=原地倒退、A/D=横向平移)
  const rr=Math.hypot(me.pos[0],me.pos[1]); if(rr>ARENA_R-0.6){ me.pos[0]*=(ARENA_R-0.6)/rr; me.pos[1]*=(ARENA_R-0.6)/rr; }
  if(follow){ cam.target[0]=me.pos[0]; cam.target[2]=me.pos[1]; }
}

/* ==11 RENDERER== 每帧绘制 */
function render(){
  const eye=camEye();
  const view=mLookAt(eye,cam.target,UP);
  const proj=mPerspective(d2r(CAM.fov), cssW/cssH, CAM.near, CAM.far);
  const VP=mMul(proj,view);

  gl.viewport(0,0,glc.width,glc.height);
  gl.clearColor(0.055,0.065,0.085,1);
  gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
  gl.enable(gl.DEPTH_TEST);
  gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);

  // 地面 + 网格（按当前机制场地半径 ARENA_R 缩放单位网格）
  gl.depthMask(true);
  const FM=mModel(0,0,0,0,ARENA_R,1,ARENA_R);
  drawMesh(meshes.disc, mMul(VP,FM), COL.ground, 1);
  drawMesh(meshes.grid, mMul(VP,FM), COL.grid, 0.5);
  // 边缘亮环
  drawMesh(meshes.annulus, mMul(VP, mModel(0,0.013,0,0,ARENA_R,1,ARENA_R)), [0.55,0.62,0.72], 0.8);
  // 场地标点不画地面环，改为 overlay 里的立体字母（见 drawOverlay）

  // 贴花（不写深度，按顺序混合）
  gl.depthMask(false);
  for(const d of Scene.getDecals()){
    const st=DECAL_STYLE[d.type]; if(!st) continue;
    const r=d.radius||3, sc=st.thin? r : r;
    const M=mModel(d.x, st.y, d.z, d.facing||0, r, 1, r);
    drawMesh(meshes[st.mesh], mMul(VP,M), d.color||st.color, d.alpha!=null?d.alpha:st.alpha);
  }
  // 机制专属"地面层"特效（不写深度，混合）：如 Forsaken 开场紫色冲击波
  if(SIM.current && SIM.current.drawGround) SIM.current.drawGround(VP);
  // 被控职能脚下高亮环
  const me=Scene.get(humanRole);
  if(me){ drawMesh(meshes.annulus, mMul(VP, mModel(me.pos[0],0.05,me.pos[1],0,1.1,1,1.1)), COL.self, 0.9); }

  // 演员（不透明先画，半透明克隆后画）
  gl.depthMask(true);
  for(const a of Scene.list()){ if((a.alpha==null||a.alpha>=1)) drawActor(VP,a); }
  if(me){ const fnx=Math.sin(playerFacing), fnz=Math.cos(playerFacing);   // 被控职能"朝向鼻子"：现代朝镜头/传统朝移动方向
    drawMesh(meshes.sphere, mMul(VP, mModel(me.pos[0]+fnx*0.85, 1.25, me.pos[1]+fnz*0.85, 0, 0.34,0.34,0.34)), COL.self, 1); }
  // 机制专属"空中层"特效（写深度，在不透明演员之后）：如 Forsaken 踩塔倒计时光球
  if(SIM.current && SIM.current.drawAir) SIM.current.drawAir(VP);
  gl.depthMask(false);
  for(const a of Scene.list()){ if(a.alpha!=null&&a.alpha<1) drawActor(VP,a); }
  gl.depthMask(true);

  drawOverlay(VP);
}
function drawActor(VP,a){
  const M=mModel(a.pos[0],0,a.pos[1],0, a.radius,a.height,a.radius);
  drawMesh(meshes.cyl, mMul(VP,M), a.color, a.alpha==null?1:a.alpha);
}
function drawOverlay(VP){
  octx.clearRect(0,0,cssW,cssH);
  // 开场 AOE 不再全屏闪（改为 render() 里从 boss 扩散的紫圈）
  // 场地标点：立体字母/数字（始终朝向镜头，按距离缩放，带挤出阴影）
  octx.textAlign='center'; octx.textBaseline='middle';
  for(const w of WAYMARKS){
    const wx=w.dir[0]*ARENA_R*0.92, wz=w.dir[1]*ARENA_R*0.92;
    const pB=projHead(VP, wx,0.3,wz), pT=projHead(VP, wx,3.9,wz); if(!pB||!pT) continue;
    const px=Math.hypot(pT[0]-pB[0], pT[1]-pB[1]); if(px<7) continue;          // 世界高 3.6m 投到屏幕的像素 = 字号
    const cx=(pB[0]+pT[0])/2, cy=(pB[1]+pT[1])/2, ext=Math.max(1, Math.round(px*0.07));
    octx.font='900 '+px.toFixed(0)+'px system-ui,sans-serif';
    octx.fillStyle='rgba(0,0,0,0.5)'; for(let k=ext;k>0;k--) octx.fillText(w.label, cx+k*0.7, cy+k*0.8);   // 挤出感
    octx.lineWidth=Math.max(2, px*0.05); octx.strokeStyle='rgba(0,0,0,0.9)'; octx.strokeText(w.label, cx, cy);
    octx.fillStyle='rgb('+w.color.map(c=>(c*255)|0).join(',')+')'; octx.fillText(w.label, cx, cy);
  }
  // 头顶职能文字 + 点名标记
  octx.textAlign='center'; octx.textBaseline='bottom'; octx.font='bold 13px system-ui,sans-serif';
  for(const a of Scene.list()){
    if(a.kind==='clone' || !a.role) continue;
    const s=projHead(VP, a.pos[0], a.height+0.7, a.pos[1]);
    if(s){ octx.lineWidth=3; octx.strokeStyle='rgba(0,0,0,0.85)'; octx.strokeText(a.role,s[0],s[1]);
      octx.fillStyle = a.role===humanRole? '#ffe27a' : '#ffffff'; octx.fillText(a.role,s[0],s[1]); }
    if(a.marker){ const m=projHead(VP, a.pos[0], a.height+3.4, a.pos[1]); if(m) drawMarker(octx, m[0], m[1], a.marker, a.markerColor); }   // 图标放大后抬高一点,避免压住职能名
  }
  // 机制专属 2D 叠加（如 Forsaken 的 boss 读条/顶端读条）
  if(SIM.current && SIM.current.drawHud) SIM.current.drawHud(octx, VP);
  // HUD（右上）
  octx.textAlign='right'; octx.textBaseline='top'; octx.font='12px ui-monospace,monospace'; octx.fillStyle='#9fb3c8';
  let y=10; for(const line of Scene.getHUD()){ octx.fillText(line, cssW-12, y); y+=16; }
}
/* 头顶点名图标（2D 叠加层 = 始终面向镜头）：分摊=四角星 / 扇形=尖端朝下扇 / 钢铁=环+心点 */
function drawMarker(ctx,x,y,shape,mode){
  const col = '#f2cf3a';   // 头顶点名全程黄色(不再随刷新变蓝、不再让扇/摊用棕色)
  ctx.save(); ctx.translate(x,y);
  const g = shape==='cone' ? 3.0 : 1.5;   // 头顶机制图标整体放大1.5×；扇形再翻倍(≈3×)
  ctx.scale(g,g);
  ctx.lineWidth=2; ctx.strokeStyle='rgba(0,0,0,0.6)';
  if(shape==='stack'){           // 分摊：上下左右四个 >> 朝内，组成十字
    ctx.strokeStyle=col; ctx.lineWidth=2.8; ctx.lineCap='round'; ctx.lineJoin='round';
    for(let k=0;k<4;k++){ ctx.save(); ctx.rotate(k*Math.PI/2);
      for(const o of [0, 5.5]){ const tip=4.5+o, base=10+o, s=6.2;   // 两层(>>)，尖端朝中心
        ctx.beginPath(); ctx.moveTo(-s,-base); ctx.lineTo(0,-tip); ctx.lineTo(s,-base); ctx.stroke(); }
      ctx.restore(); }
  } else if(shape==='cone'){
    ctx.beginPath(); ctx.moveTo(0,11); ctx.lineTo(-10,-5); ctx.quadraticCurveTo(0,-12,10,-5); ctx.closePath(); ctx.fillStyle=col; ctx.fill(); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.arc(0,0,10,0,TAU); ctx.lineWidth=3.4; ctx.strokeStyle=col; ctx.stroke();
    ctx.beginPath(); ctx.arc(0,0,3.4,0,TAU); ctx.fillStyle=col; ctx.fill();
  }
  ctx.restore();
}

/* 读条进度条（boss 头顶 + 屏幕顶端复用）：标题(日+英) / 进度填充 / 剩余秒 */
function drawCastBar(cx, yb, bw, bh, jp, en, col, prog, rem){

  octx.fillStyle='#fff'; octx.fillText(jp+'　'+en, cx, yb-5);
  octx.fillStyle='rgba(0,0,0,0.55)'; octx.fillRect(x-2,yb-2,bw+4,bh+4);
  octx.fillStyle='rgba(28,28,38,0.95)'; octx.fillRect(x,yb,bw,bh);
  octx.fillStyle=col; octx.fillRect(x,yb,bw*prog,bh);
  octx.lineWidth=2; octx.strokeStyle='rgba(255,255,255,0.75)'; octx.strokeRect(x,yb,bw,bh);

           spreadR:4.3, orbHigh:7, effectT:0.9, towerWindow:10, aoeT:2,   // 塔=4.2(放大·原3.3)；boss环=6(放大·原5)；分摊/钢/冲锋=4.3(受偶数轮冲锋"2×baitR>spreadR不重叠"所限,不随塔放大)；接形人推距已随塔加大
           moveT:4.0, chargeT:7, cleaveT:6, flash:0.05, enrageT:2.0, npcSpeed:7.5 };   // 终结读条 -7s / 消灭之脚 -6s（落在 10s 塔窗口内，判定=塔判定）
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function shuffleR(a,rng){for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));const t=a[i];a[i]=a[j];a[j]=t;}return a;}
function inCone(p,ax,az,facing,range){ const dx=p[0]-ax, dz=p[1]-az, d=Math.hypot(dx,dz); if(d>range||d<0.05) return false;
  let da=((Math.atan2(dx,dz)-facing+Math.PI)%TAU+TAU)%TAU-Math.PI; return Math.abs(da)<=Math.PI/4; }   // 90°扇=±45°

/* ==机制：P2 Forsaken== 脑死法时间轴 + NPC 自动走位（实现统一机制接口：init/update/drawGround/drawAir/drawHud/mountOptions/reset，仅通过 Scene.* 驱动渲染） */
const FORSAKEN={ id:'p2_forsaken', name:'脑死法（全程）', group:'P2 · 遗弃末世 Forsaken', arenaR:20, phase:'idle', round:0, kind:'', t:0, subEnd:0, steps:[], stepIdx:0,
  rng:null, seed:1, rotationDir:1, coneJob:'TH', pendingPolarity:null,
  players:{}, LT:null, RT:null, towersActive:false, chargeRingActive:false, clonesActive:false, cleaveActive:false, cleaveFacing:0,
  orbT:0, orbTotal:1, orbY:0, orbActive:false, fxAoes:[], fxT:0, cleaveFxT:0, aoeFlash:0, bossFacing:0, cleaveTarget:null,
  paused:false, pauseOnFail:true, timeScale:1, failLog:[], lastFail:'', win:false,

  init(seed){
    this.seed=seed>>>0; this.rng=mulberry32(this.seed);
    this.rotationDir=this.rng()<0.5?1:-1;
    this.players={}; ALL.forEach(r=>this.players[r]={layers:4,shape:null,target:null,vuln:false,soakCount:0,marker:null,markerColor:'normal',markerT:0});
    this.initShapes(); this.pairTower={};
    ALL.forEach((r,i)=>{ Scene.get(r).pos=[ i<4?-2.6:2.6, [-9,-11,-13,-15][i%4] ]; });   // 支援列(左)/DPS列(右) 在 C 侧竖排
    ALL.forEach(r=>{ const p=this.players[r]; p.marker=p.shape; p.markerColor='normal'; p.markerT=4; });   // 开局所有人点名显示 4s
    this.despawnClones();
    this.steps=this.buildSteps(); this.stepIdx=0; this.t=0;
    this.phase='run'; this.paused=false; this.pendingPolarity=null; this.failLog=[]; this.lastFail=''; this.win=false;
    this.towersActive=false; this.chargeRingActive=false; this.cleaveActive=false;
    this.orbY=0; this.orbActive=false; this.fxAoes=[]; this.fxT=0;
    this.enterStep(this.steps[0]);
  },
  initShapes(){
    const thS=TH[Math.floor(this.rng()*4)], dpsS=DPS[Math.floor(this.rng()*4)];
    this.coneJob=this.rng()<0.5?'TH':'DPS';
    TH.forEach(r=> this.players[r].shape = r===thS?'stack':(this.coneJob==='TH'?'cone':'circle'));
    DPS.forEach(r=> this.players[r].shape = r===dpsS?'stack':(this.coneJob==='DPS'?'cone':'circle'));
  },
  buildSteps(){
    const s=[{r:0,kind:'aoe',dur:EG.aoeT}];   // 开场：AOE 全屏特效(无判定)
    for(let r=1;r<=8;r++){ const inf=ROUND[r];
      const extra=(inf.charge?EG.chargeT:0)+(inf.cleave?EG.cleaveT:0);
      s.push({r,kind:'move',dur:EG.towerWindow-extra});   // move+charge+cleave 合计=10s(光球下落)
      if(inf.charge) s.push({r,kind:'charge',dur:EG.chargeT});
      if(inf.cleave) s.push({r,kind:'cleave',dur:EG.cleaveT});
      s.push({r,kind:'soak',dur:EG.flash});
    }
    s.push({r:9,kind:'finalmove',dur:4});   // 8塔判定后 ~4s 间隔(全员集合躲)，之后才开始读最终消灭之脚
    s.push({r:9,kind:'finalcleave',dur:EG.cleaveT});
    s.push({r:10,kind:'enrage',dur:EG.enrageT});
    s.push({r:99,kind:'result',dur:1e9});
    return s;
  },
  roundAngle(r){ return d2r(this.rotationDir*45*(r-1)); },
  toWorld(side,out,A){ return [Math.cos(A)*side+Math.sin(A)*out, -Math.sin(A)*side+Math.cos(A)*out]; },

  resolveTargets(r){
    const inf=ROUND[r], A=this.roundAngle(r), P=this.players;
    this.LT=this.toWorld(-EG.halfSep,EG.ringR,A); this.RT=this.toWorld(EG.halfSep,EG.ringR,A);
    // 塔内对角点：上下 = 两塔连线中点⊥指向boss（=全局径向 -out，两塔共用同一个"上"）；左右 = 沿两塔连线(切向)
    // tw=-1左/+1右; ss=左右(-1左/+1右); os=上下(-1上/朝boss · +1下/背向)
    const inT=(tw,ss,os)=>this.toWorld(tw*EG.halfSep + ss*EG.soakSide, EG.ringR + os*EG.soakOut, A);
    const atB=(ds,dz)=>this.toWorld(ds,dz,A);
    const set=(role,xz)=>{ if(P[role]) P[role].target=xz; };
    const soak=inf.job==='TH'?TH:DPS, other=inf.job==='TH'?DPS:TH;
    const ox=Math.sin(A), oz=Math.cos(A);   // 盘外(+out)单位向量
    // 组首踩塔(各组第一次踩=ord1)锁定：含分摊的固定对 → 右塔；搭档对 → 左塔（脑死法=1/5轮；1256=1/3轮）
    if(inf.ord===1){ const sh=soak.find(x=>P[x].shape==='stack'), sp=PAIROF[sh];
      const pids=[...new Set(soak.map(x=>PAIROF[x]))];
      this.pairTower[sp]='R'; this.pairTower[pids.find(p=>p!==sp)]='L'; }
    if(inf.parity==='odd'){
      const handler = inf.job==='TH'?'D3':'H2';   // 接形人：1-4轮 D3(仍有点名,免扇) / 5-8轮 H2(已清,真吃扇1下)
      const hMarked = inf.job==='TH';
      const stk=soak.filter(x=>P[x].shape==='stack'), cone=soak.filter(x=>P[x].shape==='cone'), circ=soak.filter(x=>P[x].shape==='circle');
      const sTw = stk.length>=2 ? [-1,1] : [1];     // 3/7轮两分摊一左一右；1/5轮单分摊→右塔
      stk.forEach((s,i)=> set(s, (stk.length<2) ? inT(1,-1,-1) : inT(sTw[i], sTw[i], -1)) );   // 1/5轮单分摊→右塔"内·上(左上)"；3/7轮两分摊→各自外侧·上(朝boss)
      const host = stk[0], hostTw = sTw[0];          // 扇贴这个分摊进圈
      const oneStk=stk.length<2;
      if(oneStk){ const hpartner=ALL.find(r=>r!==host && PAIROF[r]===PAIROF[host]);   // 1/5轮：摊的搭档跟摊去同一塔(右)、另一对去左塔——搭档不拆(修D3点摊D4没跟去右塔)
        [cone,circ].forEach(arr=>{ const k=arr.indexOf(hpartner); if(k>=0){ arr.splice(k,1); arr.unshift(hpartner);
          const rest=arr.slice(1).sort((a,b)=>(LEFTMEM[b]?1:0)-(LEFTMEM[a]?1:0)); rest.forEach((r,j)=>arr[1+j]=r); } }); }   // 组首轮：余下另一对按组内奇位(左)/偶位(右)
      cone.forEach((c,i)=>{ if(i===0 && host){
          if(oneStk) set(c, inT(hostTw, hostTw, +1));   // 1/5轮：扇放摊塔"外·下(右下)" → 扇朝正下打、下方接形人接（与左上的分摊错开）
          else { const hp=P[host].target; set(c,[hp[0]+ox*3.6, hp[1]+oz*3.6]); } }   // 3/7轮：扇放分摊"正下方(+out)"、仍进分摊圈(凑人头) → 扇朝正下打、下方接形人接（塔放大后下移到3.6，让接形人仍是扇的最近目标）
        else set(c, inT(-hostTw, i===1?-1.75:-1.25, i===1?0.6:1.25)); });   // 1/5轮左塔双扇(另一对,已按ORDER排序)：i=1更左→靠左 / i=2→靠右(左下45°)
      circ.forEach((c,i)=>{ if(stk.length>=2) set(c, inT(1,-1,+1));   // 3/7轮：单个钢→右塔内下(远离分摊)
        else { const sp=[[1,1,1],[-1,-1,-1],[-1,1,1]][i%3]; set(c, inT(sp[0],sp[1],sp[2])); } });   // 1/5轮：3钢不重叠(摊塔搭档→右下,对角于左上分摊 / 左塔外上 / 左塔内下)
      if(P[handler]){
        if(oneStk){ const bs=cone[0]||circ[0], bp=bs?P[bs].target:this.RT;   // 1/5轮：接形人站"摊塔底侧那人(钢/扇)正下方(+out)" → 引导扇形/接钢
          P[handler].target=[ bp[0]+ox*3.6, bp[1]+oz*3.6 ]; }
        else if(cone[0] && host){ const hp=P[host].target, sx=Math.cos(A), sz=-Math.sin(A);   // 3/7轮有扇：接形人站扇的左下、明显往左上收(-out上 / -side左2.6)，落在左塔环外的左下角 → 扇朝左下打到他、只吃1下
          P[handler].target=[ hp[0]+ox*4.8 - sx*2.6, hp[1]+oz*4.8 - sz*2.6 ]; }
        else { const ap=circ[0]?P[circ[0]].target:this.RT;   // 兜底
          const atc=Math.hypot(ap[0]-this.LT[0],ap[1]-this.LT[1])<Math.hypot(ap[0]-this.RT[0],ap[1]-this.RT[1])?this.LT:this.RT;
          let ax=ap[0]-atc[0], az=ap[1]-atc[1], am=Math.hypot(ax,az)||1; P[handler].target=[ ap[0]+ax/am*4.7, ap[1]+az/am*4.7 ]; } }
      // 垫分摊：按"每座分摊还差几人"分配；全部推到塔环外(仍在 2.6 分摊圈内) → 塔里只有 2 个踩塔者
      const pads = other.filter(rr=>rr!==handler);
      const partner = pads.find(r => PAIROF[r]===PAIROF[handler]);   // 接形人的搭档(同对的另一人)
      if(partner){ const k=pads.indexOf(partner); pads.splice(k,1); pads.unshift(partner); }   // 搭档优先垫"左塔(扇)分摊"(stk[0],need=1) → 3轮=D4 / 7轮=H1；完整的另一对一起垫右塔
      const need = stk.map(s=>{ let b=1; cone.forEach(c=>{ if(Math.hypot(P[c].target[0]-P[s].target[0],P[c].target[1]-P[s].target[1])<=EG.spreadR) b++; }); return Math.max(1,3-b); });
      const assign=[]; stk.forEach((s,si)=>{ for(let n=0;n<need[si];n++) assign.push(si); }); while(assign.length<pads.length) assign.push(0);
      const pc={};
      pads.forEach((role,i)=>{ const si=assign[i]||0, h=stk[si]||soak[0], hp=P[h].target, k=(pc[si]=(pc[si]||0)+1)-1, tg=(k-0.5)*1.4;
        set(role, [ hp[0]-ox*3.3 + (-oz)*tg, hp[1]-oz*3.3 + ox*tg ]); });   // 朝boss侧(-out)推出塔环、仍在4.3分摊圈内 → 避开盘外的扇楔形
    } else {
      // 偶数轮(过去/未来终焉=跳跃)：每塔 1扇形+1钢铁。左右塔 = 上一轮(同组奇数轮)踩塔的相对左右(面向boss)
      const Aprev=this.roundAngle(r-1), sidePrev=role=>{const p=Scene.get(role).pos; return Math.cos(Aprev)*p[0]-Math.sin(Aprev)*p[1];};   // 上一轮坐标投到上一轮切向轴：小=更左
      const cones=soak.filter(x=>P[x].shape==='cone').sort((a,b)=>sidePrev(a)-sidePrev(b));   // [0]=上一轮更左→左塔, [1]→右塔
      const circs=soak.filter(x=>P[x].shape==='circle').sort((a,b)=>sidePrev(a)-sidePrev(b));
      // 扇形→各自塔"外·上角"(塔与boss环夹角)，楔形朝场外(由引导人作最近目标)
      if(cones[0]) set(cones[0], inT(-1,-1,-1)); if(cones[1]) set(cones[1], inT(+1,+1,-1));
      // 钢铁→各自塔"正下方"(沿中轴远离boss, 仍在塔内)
      if(circs[0]) set(circs[0], inT(-1,0,+1.8)); if(circs[1]) set(circs[1], inT(+1,0,+1.8));
      // 不踩塔组：TL/TR 两人留 boss 附近引导跳跃；BL/BR 两人(D3/D4 或 H1/H2)出到扇形外侧引导扇形
      const cs=EG.halfSep+EG.soakSide, gdist=4.5;   // 引导人=扇形再往外 gdist：<钢铁距(确保是扇形最近目标→楔形朝外)、>分摊半径(不吃扇形者的跳跃)
      const map=inf.job==='TH'?{D1:'TL',D2:'TR',D3:'L',D4:'R'}:{MT:'TL',ST:'TR',H1:'L',H2:'R'};
      other.forEach(role=>{ const m=map[role];
        if(m==='TL') set(role, atB(-EG.baitR,-EG.baitR));
        else if(m==='TR') set(role, atB(EG.baitR,-EG.baitR));
        else if(m==='L') set(role, this.toWorld(-(cs+gdist), EG.ringR-EG.soakOut, A));   // 左扇外侧引导
        else if(m==='R') set(role, this.toWorld(cs+gdist, EG.ringR-EG.soakOut, A)); });   // 右扇外侧引导
    }
    // 消灭之脚引导：cleave 轮先聚到引导点(过去→两塔中间 +out / 未来→对面 -out)，读条开始后再散到踩塔/垫人位(enterStep)
    if(inf.cleave){ const front=this.pendingPolarity==='past'?1:-1;
      ALL.forEach((role,i)=>{ const p=P[role]; if(!p) return; p.soakT=p.target;
        p.target=this.toWorld((i%4-1.5)*1.1, front*EG.ringR*0.7, A); }); }
  },

  spawnClones(){ const b=Scene.get('BOSS').pos; for(let i=0;i<3;i++){ const a=i/3*TAU; Scene.addActor({id:'C'+i,kind:'clone',role:'',pos:[b[0]+Math.cos(a)*0.7,b[1]+Math.sin(a)*0.7],color:[1,1,1],radius:2.0,height:4.0,alpha:0.32}); } this.clonesActive=true; },
  despawnClones(){ for(let i=0;i<3;i++) Scene.removeActor('C'+i); this.clonesActive=false; },

  enterStep(st){
    this.round=st.r; this.kind=st.kind; this.t=0; this.subEnd=st.dur;
    this.orbActive=(st.r>=1&&st.r<=8)&&(st.kind==='move'||st.kind==='charge'||st.kind==='cleave');
    if(st.kind==='aoe'){ /* 开场 AOE = render() 里从 boss 快速扩散的紫色冲击波，不再全屏闪 */ }
    else if(st.kind==='move'){ this.resolveTargets(st.r); this.towersActive=true;
      this.orbTotal=EG.towerWindow; this.orbT=0; this.orbY=EG.orbHigh; }
    else if(st.kind==='finalmove'){ this.towersActive=false;   // 8塔后间隔：塔消失，全员去"第8组塔中间"引导(无论过去/未来都先到这)，还没开始读条
      const A=this.roundAngle(8), gx=Math.sin(A)*EG.ringR, gz=Math.cos(A)*EG.ringR;   // 两塔正中间(+out)
      ALL.forEach((r,i)=>this.players[r].target=[gx+(i%4-1.5)*0.7, gz+(i<4?-0.7:0.7)]); }
    else if(st.kind==='charge'){ this.spawnClones(); this.chargeRingActive=true; this.pendingPolarity=this.rng()<0.5?'past':'future'; }
    else if(st.kind==='cleave'||st.kind==='finalcleave'){ this.cleaveActive=true;
      const A=this.roundAngle(st.r===9?8:st.r); this.cleaveFacing=A+Math.PI;   // 致命半场 = 背离本组两塔（踩塔/垫人天然在安全半）
      this.bossFacing=(this.pendingPolarity==='future')? this.cleaveFacing : this.cleaveFacing+Math.PI;   // 未来=面前挨刀(boss 面朝致命半)；过去=背后挨刀(boss 背朝致命半)
      let best='MT',bd=9; for(const r of ALL){ const p=Scene.get(r).pos, a=Math.atan2(p[0],p[1]); const d=Math.abs(((a-this.bossFacing+Math.PI)%TAU+TAU)%TAU-Math.PI); if(d<bd){bd=d;best=r;} }
      this.cleaveTarget=best;   // 读条开始随机锁定一名玩家，boss 转向他（取最接近朝向者）
      if(st.kind==='cleave'){ ALL.forEach(role=>{ const p=this.players[role]; if(p&&p.soakT) p.target=p.soakT; }); }   // 引导完→散开到踩塔/垫人位
      if(st.kind==='finalcleave'){ const past=this.pendingPolarity==='past';   // 引导完：过去=原地不动(中间就安全)；未来=对穿到对面
        this.cleaveFacing = past ? A+Math.PI : A;   // 过去=打背面(致命半=-out,两塔中间安全)；未来=打正面(致命半=+out,中间挨刀→必须对穿)
        const d = past ? EG.ringR : -EG.ringR, gx=Math.sin(A)*d, gz=Math.cos(A)*d;   // 过去→留两塔中间(+out)；未来→对穿到对面(-out)
        ALL.forEach((r,i)=>this.players[r].target=[gx+(i%4-1.5)*0.7, gz+(i<4?-0.7:0.7)]); } }
    else if(st.kind==='soak'){ this.resolveAOEs(st.r); this.detonate(st.r); }   // 光球落地=踩塔判定：只结算 AOE 命中(死人=吃到≥2伤害)，不再判"是否到位"
    else if(st.kind==='enrage'){ this.towersActive=false; }
  },
  exitStep(st){
    if(st._done) return; st._done=true;
    if(st.kind==='charge'){ this.applyVuln(); this.chargeRingActive=false; }
    else if(st.kind==='cleave'||st.kind==='finalcleave'){ this.checkCleave(); this.despawnClones(); this.cleaveActive=false; this.cleaveFxT=1.2; }   // 读条结束=伤害判定 → 这时才闪现命中半场范围1.2s
    else if(st.kind==='enrage'){ this.checkEnrage(); }
  },

  applyVuln(){ const b=ROUND[this.round].job==='TH'?DPS:TH; b.forEach(r=>this.players[r].vuln=true); },
  detonate(r){ const inf=ROUND[r], soak=inf.job==='TH'?TH:DPS;
    soak.forEach(role=>{ this.players[role].layers--; this.players[role].soakCount++; });
    if(this.players[soak[0]].layers>0){ const bag=inf.parity==='odd'?['circle','circle','cone','cone']:['circle','cone','stack','stack']; shuffleR(bag,this.rng);
      soak.forEach((role,i)=>{ const p=this.players[role]; p.shape=bag[i]; p.marker=bag[i]; p.markerColor='blue'; p.markerT=4; }); }   // 踩塔者刷新 → 蓝色点名 4s
    else soak.forEach(role=>{ const p=this.players[role]; p.shape=null; p.marker=null; p.markerT=0; });
  },
  checkHuman(){
    const meA=Scene.get(humanRole); if(!meA) return;   // OB 模式无玩家
    const me=meA.pos, t=this.players[humanRole].target;
    if(t){ const d=Math.hypot(me[0]-t[0],me[1]-t[1]); if(d>2.8) this.fail('('+humanRole+') 未到指定位置 (差 '+d.toFixed(1)+'m)'); }
  },
  /* 踩塔判定瞬间：结算各 AOE 命中 + 失败检测 */
  resolveAOEs(r){
    const inf=ROUND[r], soak=inf.job==='TH'?TH:DPS, soakSet=new Set(soak), aoes=[];
    for(const role of soak){ const p=this.players[role], a=Scene.get(role).pos;
      if(p.shape==='circle') aoes.push({kind:'spread',x:a[0],z:a[1],radius:EG.spreadR,owner:role});
      else if(p.shape==='stack') aoes.push({kind:'stack',x:a[0],z:a[1],radius:EG.spreadR,owner:role});
      else if(p.shape==='cone'){ let bx=a[0],bz=a[1]+1,bd=1e18;   // 扇形：锁定最近一人，从自己朝他打出（90°）
        for(const o of ALL){ if(o===role) continue; const q=Scene.get(o).pos, dd=(q[0]-a[0])*(q[0]-a[0])+(q[1]-a[1])*(q[1]-a[1]); if(dd<bd){bd=dd; bx=q[0]; bz=q[1];} }
        aoes.push({kind:'cone',x:a[0],z:a[1],facing:Math.atan2(bx-a[0],bz-a[1]),owner:role}); } }
    if(inf.charge){ const bp=Scene.get('BOSS').pos;   // 过去/未来终焉：boss+3分身冲锋"最近4人"(各落一个跳跃圈)；扇形者在塔(次近)会吃到, 外侧引导人不吃
      const near=ALL.slice().sort((x,y)=>{const px=Scene.get(x).pos,py=Scene.get(y).pos; return Math.hypot(px[0]-bp[0],px[1]-bp[1])-Math.hypot(py[0]-bp[0],py[1]-bp[1]);}).slice(0,4);
      for(const role of near){ const a=Scene.get(role).pos; aoes.push({kind:'charge',x:a[0],z:a[1],radius:EG.spreadR,owner:role}); } }
    this.fxAoes=aoes; this.fxT=EG.effectT;
    const hit={}; ALL.forEach(x=>hit[x]=0);
    for(const ao of aoes){ for(const role of ALL){ const p=Scene.get(role).pos; let inside;
      if(ao.kind==='cone') inside = (this.players[role].shape==null) && role!==ao.owner && inCone(p,ao.x,ao.z,ao.facing,EG.coneRange);  // 扇形只打"无点名"的人
      else inside = Math.hypot(p[0]-ao.x,p[1]-ao.z)<=ao.radius;
      if(inside) hit[role]++; } }
    for(const role of ALL) if(hit[role]>=2) this.fail('('+role+') 同时吃到 '+hit[role]+' 个伤害');   // 3.1
    for(const ao of aoes){ if(ao.kind!=='stack') continue; let n=0; for(const role of ALL){ const p=Scene.get(role).pos; if(Math.hypot(p[0]-ao.x,p[1]-ao.z)<=ao.radius) n++; } if(n<3) this.fail('分摊('+ao.owner+') 只有 '+n+' 人 (<3)'); }   // 3.2
    for(const T of [['左',this.LT],['右',this.RT]]){ const c=T[1]; let n=0,who=[]; for(const role of ALL){ const p=Scene.get(role).pos; if(Math.hypot(p[0]-c[0],p[1]-c[1])<=EG.towerR){ n++; who.push(role); } } if(n!==2) this.fail(T[0]+'塔内 '+n+' 人 ['+who.join(',')+']（塔里只能 2 人踩塔）'); }   // 3.3 塔内总人数(踩塔会放buff,只能2人)
  },
  checkCleave(){ const meA=Scene.get(humanRole); if(!meA) return;   // OB 模式无玩家
    const dir=[Math.sin(this.cleaveFacing),Math.cos(this.cleaveFacing)], me=meA.pos;
    if(me[0]*dir[0]+me[1]*dir[1] > 0.5) this.fail('('+humanRole+') 站在消灭之脚命中半场'); },
  checkEnrage(){ const bad=ALL.filter(r=>this.players[r].layers>0); if(bad.length) this.fail('制裁之光: '+bad.join(',')+' 仍有咏唱危机层 → 碎屏'); this.win=this.failLog.length===0; this.phase='done'; },
  fail(msg){ this.failLog.push({msg,round:this.round}); this.lastFail=msg; if(this.pauseOnFail) this.paused=true; },

  seek(role,dt){ const a=Scene.get(role), p=this.players[role]; if(!a||!p||!p.target) return;
    const dx=p.target[0]-a.pos[0], dz=p.target[1]-a.pos[1], d=Math.hypot(dx,dz); if(d<0.05) return;
    const s=Math.min(d,EG.npcSpeed*dt); a.pos[0]+=dx/d*s; a.pos[1]+=dz/d*s; },

  update(dt){
    if(this.phase==='idle'){ this.setHUD(); return; }
    if(this.phase==='run' && !this.paused){
      const sdt=dt*this.timeScale;
      for(const role of ALL){ const p=this.players[role]; if(p.markerT>0) p.markerT-=sdt; }   // 点名 4s 倒计时
      if(this.orbActive){ this.orbT+=sdt; this.orbY=EG.orbHigh*(1-Math.min(1,this.orbT/this.orbTotal)); }   // 光球下落
      if(this.fxT>0) this.fxT-=sdt;   // AOE 特效残留
      if(this.cleaveFxT>0) this.cleaveFxT-=sdt;   // 消灭之脚"命中半场"特效残留(读条结束才闪)
      if(this.aoeFlash>0) this.aoeFlash-=sdt;   // 开场全屏闪衰减
      this.t += sdt;
      for(const role of ALL) if(role!==humanRole) this.seek(role, sdt);
      let guard=0;
      while(this.phase==='run' && !this.paused && this.t>=this.subEnd && guard++<20){
        const st=this.steps[this.stepIdx], over=this.t-this.subEnd;
        this.exitStep(st); if(this.paused) break;
        this.stepIdx++; if(this.stepIdx>=this.steps.length){ this.phase='done'; break; }
        this.enterStep(this.steps[this.stepIdx]); this.t=over;
      }
    }
    this.buildDecals(); this.setHUD();
  },
  buildDecals(){
    const d=[];
    const bb=Scene.get('BOSS'); if(bb) d.push({type:'bossring',x:bb.pos[0],z:bb.pos[1],radius:EG.bossHitR});   // boss 身位环(常显)
    if(this.towersActive && this.LT){ d.push({type:'tower',x:this.LT[0],z:this.LT[1],radius:EG.towerR},{type:'tower',x:this.RT[0],z:this.RT[1],radius:EG.towerR}); }
    // 头顶点名：同步到 actor，由 overlay 以面向镜头的图标绘制（不再在地面画形状）
    for(const role of ALL){ const a=Scene.get(role), p=this.players[role]; if(a&&p){ a.marker=(p.markerT>0?p.marker:null); a.markerColor=p.markerColor; } }
    if(this.fxT>0){ for(const ao of this.fxAoes){   // AOE 特效(命中瞬间的爆点)
      if(ao.kind==='cone') d.push({type:'cone',x:ao.x,z:ao.z,facing:ao.facing,radius:EG.coneRange,color:[1,0.5,0.12],alpha:0.5});
      else if(ao.kind==='stack') d.push({type:'stack',x:ao.x,z:ao.z,radius:ao.radius,color:[0.35,0.72,1],alpha:0.6});
      else if(ao.kind==='spread') d.push({type:'spread',x:ao.x,z:ao.z,radius:ao.radius,color:[1,0.8,0.2],alpha:0.6});
      else if(ao.kind==='charge') d.push({type:'charge',x:ao.x,z:ao.z,radius:ao.radius,color:[1,0.45,0.45],alpha:0.7}); } }
    if(this.chargeRingActive){ const b=Scene.get('BOSS').pos; d.push({type:'charge',x:b[0],z:b[1],radius:EG.chargeR}); }
    if(this.cleaveFxT>0) d.push({type:'halfcleave',x:0,z:0,radius:36,facing:this.cleaveFacing});   // 消灭之脚只在读条结束(伤害判定)瞬间显示范围，读条过程中不显示
    // （不再显示"该去哪"的目标残影——判定只看有没有人吃到 2 个伤害/死人）
    Scene.setDecals(d);
  },
  setHUD(){
    const L=[], inf=ROUND[this.round];
    L.push((humanRole==='OB'?'OB 观察 · 8 人自动':'我: '+humanRole)+'   种子: '+this.seed);
    if(this.phase==='idle') L.push('点 [开始/重置] 运行脑死法');
    else{
      L.push('轮 '+(this.round<=8?this.round:(this.round===9?'终结':this.round===10?'制裁':'结束'))+'  '+this.kind+(inf?('  '+inf.job+'/'+inf.parity):''));
      L.push('旋向 '+(this.rotationDir>0?'CW':'CCW')+'   扇组 '+this.coneJob+(this.pendingPolarity?('   '+(this.pendingPolarity==='past'?'过去':'未来')):''));
      L.push('T 层 '+TH.map(r=>this.players[r].layers).join(' ')+'    D 层 '+DPS.map(r=>this.players[r].layers).join(' '));
    }
    if(this.paused) L.push('⏸ 已暂停'+(this.lastFail?('  ✖ '+this.lastFail):''));
    if(this.phase==='done') L.push(this.win?'✅ 通关（全员清层）':('❌ 失败 ×'+this.failLog.length));
    Scene.setHUD(L);
  },
  /* ===== 统一机制接口 ===== */
  reset(){   // 切到本机制 / 待命预览：复位场景到开局列队、清贴花，phase=idle（点开始才 init 运行）
    this.phase='idle'; this.round=0; this.kind=''; this.t=0; this.subEnd=0;
    this.despawnClones(); this.towersActive=false; this.chargeRingActive=false; this.cleaveActive=false;
    this.orbActive=false; this.orbY=0; this.fxT=0; this.cleaveFxT=0; this.pendingPolarity=null;
    ALL.forEach((r,i)=>{ const a=Scene.get(r); if(a){ a.pos=[i<4?-2.6:2.6,[-9,-11,-13,-15][i%4]]; a.marker=null; } });
    Scene.setDecals([]); this.setHUD();
  },
  drawGround(VP){   // 开场 AOE：从 boss 快速扩散的紫色冲击波（地面层，不写深度）
    if(this.kind!=='aoe') return;
    const p=Math.min(1, this.t/0.9), a=Math.min(1, 2.6*(1-p));
    if(a>0){ const rr=Math.max(0.5,p*R);
      drawMesh(meshes.circle,  mMul(VP, mModel(0,0.04,0,0,rr,1,rr)), [0.50,0.20,0.92], 0.22*a);
      drawMesh(meshes.annulus, mMul(VP, mModel(0,0.06,0,0,rr,1,rr)), [0.72,0.42,1.0], 0.9*a); }
  },
  drawAir(VP){   // 踩塔倒计时光球（在两塔正中下落，空中层，写深度）
    if(this.orbActive && this.LT && this.orbY>0.1){
      for(const T of [this.LT, this.RT]) drawMesh(meshes.sphere, mMul(VP, mModel(T[0], this.orbY+0.6, T[1], 0, 0.75,0.75,0.75)), [1.0,0.96,0.62], 0.95);
    }
  },
  drawHud(octx, VP){   // boss 头顶 + 屏幕顶端读条（終焉 -7s / 消滅の脚 -6s）
    if(this.kind==='charge'||this.kind==='cleave'||this.kind==='finalcleave'){
      let jp,en,col;
      if(this.kind==='charge'){ const past=this.pendingPolarity==='past'; jp=past?'過去の終焉':'未来の終焉'; en=past?"Past's End":"Future's End"; col='#b06bff'; }
      else { jp='消滅の脚'; en='All things Ending'; col='#ff5d5d'; }
      const prog=Math.max(0,Math.min(1, this.t/Math.max(0.01,this.subEnd))), rem=Math.max(0,this.subEnd-this.t);
      drawCastBar(cssW/2, 48, 380, 22, jp, en, col, prog, rem);   // 顶端固定读条（跟随视角也可见）
      const ba=Scene.get('BOSS'), s=ba&&projHead(VP, ba.pos[0],(ba.height||4)+2.4, ba.pos[1]);
      if(s) drawCastBar(s[0], s[1], 250, 15, jp, en, col, prog, rem);   // boss 头顶读条
    }
  },
  mountOptions(el){   // 机制专属 UI：打法（脑死法 / 1256）
    el.innerHTML = '<div>打法：<select id="stratSel">'
      + '<option value="1234">脑死法（TH 1·2·3·4 / DPS 5·6·7·8）</option>'
      + '<option value="1256">1256（TH 1·2·5·6 / DPS 3·4·7·8）</option>'
      + '</select></div>';
    const self=this;
    $('stratSel').value = (ROUND===ROUND_1256?'1256':'1234');
    $('stratSel').addEventListener('change', e=>{ ROUND=STRATS[e.target.value]||ROUND_1234; self.init(parseInt($('seedInp').value)||1); $('pauseBtn').textContent='暂停'; });   // 切换打法→重置本把
  }
};

/* ====== 机制组：P3 · 一运（每个机制独立练习，不串完整时间轴；场地 30m）====== */
const P3 = {
  arenaR: 30,
  ATTR: { fire:{cn:'炎',col:[1.0,0.45,0.18]}, water:{cn:'水',col:[0.32,0.62,1.0]}, wind:{cn:'风',col:[0.45,0.9,0.55]} },
  diagPos(i,rad){ const t=d2r([45,135,225,315][((i%4)+4)%4]); return [-Math.sin(t)*rad, Math.cos(t)*rad]; },   // i=0..3 → 斜点 1/2/3/4 (NE/SE/SW/NW)
  clearCrystals(){ for(const a of Scene.list()) if(a.kind==='crystal') Scene.removeActor(a.id); },
  spawnCrystal(id,attr,pos){ Scene.addActor({id,kind:'crystal',role:'',pos:pos.slice(),color:this.ATTR[attr].col,radius:1.3,height:3.4,alpha:1,attr}); },
  ringActors(rad){ ALL.forEach((r,i)=>{ const a=Scene.get(r), ang=i/8*TAU-Math.PI/2; if(a){ a.pos=[Math.cos(ang)*rad, Math.sin(ang)*rad]; a.marker=null; } }); },
  nearest(x,z,pool){ let best=null,bd=1e18; for(const r of (pool||ALL)){ const p=Scene.get(r).pos, dx=p[0]-x, dz=p[1]-z, d=dx*dx+dz*dz; if(d<bd){bd=d;best=r;} } return best; },
  nearestN(x,z,n,pool){ return (pool||ALL).slice().sort((a,b)=>{const pa=Scene.get(a).pos,pb=Scene.get(b).pos; return (Math.hypot(pa[0]-x,pa[1]-z))-(Math.hypot(pb[0]-x,pb[1]-z));}).slice(0,n); },   // 最近 n 人(按到 x,z 距离)
  farthest(x,z,pool){ let best=null,bd=-1; for(const r of (pool||ALL)){ const p=Scene.get(r).pos, dx=p[0]-x, dz=p[1]-z, d=dx*dx+dz*dz; if(d>bd){bd=d;best=r;} } return best; },
  pick(rng,arr,n){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));const t=a[i];a[i]=a[j];a[j]=t;} return a.slice(0,n); },
  hitCircle(p,x,z,r){ return Math.hypot(p[0]-x,p[1]-z)<=r; },
  hitDonut(p,x,z,r){ const d=Math.hypot(p[0]-x,p[1]-z); return d>=r*0.34 && d<=r; },   // 0.34=donut 内半径比例(与 meshes.donut 一致)
  knockFrom(aoes){ for(const r of ALL){ const p=Scene.get(r).pos; let vx=0,vz=0;   // 被带 kb 标记的 AOE 命中→从该 AOE 中心向外击退(多个则矢量相加)
    for(const ao of aoes){ if(!ao.kb) continue; const ins=ao.type==='donut'?this.hitDonut(p,ao.x,ao.z,ao.radius):this.hitCircle(p,ao.x,ao.z,ao.radius);
      if(ins){ let dx=p[0]-ao.x, dz=p[1]-ao.z, d=Math.hypot(dx,dz)||1; vx+=dx/d*(ao.kbDist||10); vz+=dz/d*(ao.kbDist||10); } }
    if(vx||vz) startKBv(r,vx,vz); } }
};
/* 统一机制接口的基底：子机制提供 setup()/tick()/hudLines()/extra()/resolve() */
function p3mech(def){
  return Object.assign({
    group:'P3 · 一运', arenaR:P3.arenaR,
    phase:'idle', seed:1, paused:false, pauseOnFail:true, timeScale:1, win:false, lastFail:'', failLog:[],
    t:0, subEnd:0, kind:'', rng:null, players:{}, fxAoes:null, fxT:0, hitSet:[],
    fail(msg){ if(!this.lastFail) this.lastFail=msg; this.failLog.push({msg}); if(this.pauseOnFail) this.paused=true; },
    reset(){ this.phase='idle'; this.t=0; this.kind=''; this.win=false; this.paused=false; this.failLog=[]; this.lastFail=''; this.fxAoes=null; this.fxT=0; this.hitSet=[];
      clearKB(); P3.clearCrystals(); P3.ringActors(11); this.players={}; ALL.forEach(r=>this.players[r]={}); Scene.setDecals([]);
      if(this.onReset) this.onReset(); this.hud(); },
    init(seed){ this.seed=seed>>>0; this.rng=mulberry32(this.seed); this.reset(); this.phase='run'; this.t=0; this.setup(); this.hud(); },
    update(dt){
      if(this.phase!=='run'||this.paused){ this.hud(); return; }
      const sdt=dt*this.timeScale; this.t+=sdt; if(this.fxT>0) this.fxT-=sdt;
      for(const r of ALL){ const tg=this.players[r]&&this.players[r].target; if(r!==humanRole&&!KB[r]&&tg){ const a=Scene.get(r), dx=tg[0]-a.pos[0], dz=tg[1]-a.pos[1], d=Math.hypot(dx,dz); if(d>0.05){ const s=Math.min(d,7.5*sdt); a.pos[0]+=dx/d*s; a.pos[1]+=dz/d*s; } } }
      if(this.tick) this.tick(sdt);
      this.buildDecals(); this.hud();
    },
    buildDecals(){ const d=[]; if(this.fxT>0&&this.fxAoes) for(const ao of this.fxAoes) d.push(ao); if(this.extra) this.extra(d); Scene.setDecals(d); },
    judge(aoes){ const hit={}; ALL.forEach(r=>hit[r]=0);
      for(const ao of aoes){ for(const r of ALL){ const p=Scene.get(r).pos; const ins = ao.type==='donut'?P3.hitDonut(p,ao.x,ao.z,ao.radius):P3.hitCircle(p,ao.x,ao.z,ao.radius); if(ins) hit[r]++; } }
      this.hitSet=ALL.filter(r=>hit[r]>0);
      if(humanRole!=='OB' && hit[humanRole]>0) this.fail('('+humanRole+') 被命中 '+hit[humanRole]+' 个 AOE'); },
    hud(){ Scene.setHUD(this.hudLines?this.hudLines():[this.name]); }
  }, def);
}
/* 混沌之炎：N人火debuff→到期各放5m圆；火水晶→最近玩家10m环形【烈焰】(中心安全, 附击退) */
const P3_FIRE = p3mech({ id:'p3_fire', name:'混沌之炎（火）',
  setup(){ const di=Math.floor(this.rng()*4); this.crPos=P3.diagPos(di,this.arenaR*0.6); P3.spawnCrystal('CR0','fire',this.crPos);
    this.marked=[P3.pick(this.rng,TH,1)[0],P3.pick(this.rng,DPS,1)[0]]; this.subEnd=9; this.kind='warn'; },
  tick(){ if(this.kind==='warn'&&this.t>=this.subEnd) this.resolve(); if(this.kind==='hit'&&this.fxT<=0) this.kind='done'; },
  resolve(){ this.kind='hit'; const aoes=[];
    this.marked.forEach(r=>{ const p=Scene.get(r).pos; aoes.push({type:'spread',x:p[0],z:p[1],radius:5,color:P3.ATTR.fire.col,alpha:0.42}); });
    this.blazeTgt=P3.nearestN(this.crPos[0],this.crPos[1],2);   // 火水晶点名最近2人，各放一个10m环形烈焰(中心安全, 命中者被击退)
    this.blazeTgt.forEach(r=>{ const tp=Scene.get(r).pos; aoes.push({type:'donut',x:tp[0],z:tp[1],radius:10,color:[1,0.5,0.15],alpha:0.4,kb:true,kbDist:11}); });
    this.fxAoes=aoes; this.fxT=1.6; this.judge(aoes); P3.knockFrom(aoes); },
  extra(d){ if(this.kind==='warn') this.marked.forEach(r=>{ const p=Scene.get(r).pos; d.push({type:'spread',x:p[0],z:p[1],radius:5,color:P3.ATTR.fire.col,alpha:0.13}); }); },
  hudLines(){ const L=['P3·一运 — 混沌之炎（火）  场地30m  种子:'+this.seed];
    if(this.kind==='warn') L.push('火点名: '+this.marked.join(' / ')+'    '+Math.max(0,this.subEnd-this.t).toFixed(1)+'s 到期','到期: 本人 5m 圆(+4s魔易)；火水晶→最近2人 各 10m 环形【烈焰】(中心安全,会击退)');
    else L.push('烈焰命中最近2人: '+(this.blazeTgt||[]).join(','), this.hitSet.length?('被命中: '+this.hitSet.join(',')):'无人被命中','点[开始]重练(随机点名/水晶位)');
    if(this.lastFail) L.push('✖ '+this.lastFail); return L; }
});

/* ==机制注册表 + 切换器== 共享核心(渲染/相机/移动/主循环/AOE图元)只维护一份；每个机制是注册表里实现统一接口的对象 */
const SIM={
  mechs:{}, order:[], current:null,
  register(m){ this.mechs[m.id]=m; this.order.push(m); },
  select(id){ const m=this.mechs[id]; if(!m) return; this.current=m;
    clearKB(); ARENA_R = m.arenaR||R; cam.dist=clamp(ARENA_R*1.85,12,90);   // 适配场地大小的默认视距
    m.mountOptions ? m.mountOptions($('mechOpts')) : ($('mechOpts').innerHTML='');
    m.reset();   // 切换=复位到该机制待命预览（点开始才运行）
    const pb=$('pauseBtn'); if(pb) pb.textContent='暂停';
  }
};
SIM.register(FORSAKEN); SIM.register(P3_FIRE); SIM.register(P3_WATER);
Scene.onTick = (dt)=>{ if(SIM.current) SIM.current.update(dt); };

$('pauseBtn').addEventListener('click',e=>{ const m=SIM.current; if(m.phase!=='run') return; m.paused=!m.paused; e.target.textContent=m.paused?'继续':'暂停'; });

$('reseedBtn').addEventListener('click',()=>{ $('seedInp').value=Math.floor(Math.random()*1e9); });

// 机制下拉：按 group 分组(optgroup)填充 + 切换
(function(){ const sel=$('mechSel'), groups={}, gorder=[];

function resize(){
  cssW=window.innerWidth||document.documentElement.clientWidth||1280;
  cssH=window.innerHeight||document.documentElement.clientHeight||720;
  const dpr=Math.min(devicePixelRatio||1, 2);
  glc.width=Math.round(cssW*dpr); glc.height=Math.round(cssH*dpr); glc.style.width=cssW+'px'; glc.style.height=cssH+'px';
  oc.width=Math.round(cssW*dpr); oc.height=Math.round(cssH*dpr); oc.style.width=cssW+'px'; oc.style.height=cssH+'px';
  octx.setTransform(dpr,0,0,dpr,0,0);
}
addEventListener('resize',resize); resize();

let last=performance.now();
function frame(now){
  const dt=clamp((now-last)/1000, 0, 0.05); last=now;
  // 视口拿到真实尺寸后自动校正（应对预览环境初始 0 尺寸）
  if((window.innerWidth&&window.innerWidth!==cssW)||(window.innerHeight&&window.innerHeight!==cssH)) resize();
  pollGamepad(dt);
  updatePlayer(dt);
  tickKB(dt*((SIM.current&&SIM.current.timeScale)||1));   // 击退平滑推进(随机制速度缩放)
  if(Scene.onTick) Scene.onTick(dt);
  render();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
