<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>UMAD 助手 · 黑洞 + P4</title>
<style>
  :root{
    --bg:#0c0f14; --panel:#161b24; --panel2:#1d2533; --line:#2b3545;
    --txt:#e8eef6; --dim:#8a99ad;
    --share:#4aa3ff; --spread:#ffd84a; --cone:#ff8a3c; --soak:#2ea043; --pad:#3a4452; --aoe:#b06bff; --next:#2f6fb0;
    --atk:#ffd24a; --chn:#bb7dff; --ban:#ee5a4f; --gold:#ffd966;   /* 黑洞: 攻击=黄 锁链=紫 禁止=红 */
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
    font-family:system-ui,"Microsoft YaHei",sans-serif;}
  body{display:flex;flex-direction:column;}

  .tabs{display:flex;gap:6px;padding:7px 8px 0;flex:none;}
  .tab{flex:1;text-align:center;padding:9px;border-radius:11px 11px 0 0;border:2px solid var(--line);border-bottom:none;
    background:var(--panel);color:var(--dim);font-weight:800;font-size:clamp(15px,2.7vh,23px);cursor:pointer;}
  .tab.on{background:var(--panel2);color:var(--txt);border-color:#46566c;}
  .linkbtn{flex:none;padding:9px 13px;border-radius:11px 11px 0 0;border:2px solid var(--line);border-bottom:none;
    background:var(--panel);color:var(--dim);font-weight:800;font-size:clamp(13px,2.4vh,19px);cursor:pointer;white-space:nowrap;}
  .linkbtn.on{background:#11321f;border-color:#2ea043;color:#8fe0a8;}

  .app{flex:1;min-height:0;display:flex;gap:8px;padding:8px;}
  .left{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px;min-height:0;}
  .right{width:40%;max-width:460px;display:flex;flex-direction:column;gap:8px;min-height:0;}
  body.m-p4 .right{width:60%;max-width:760px;}   /* P4 按钮多，给它更宽；黑洞保持 40% */
  body.m-sushi .right{display:none;}             /* sushi 只显示一张图，铺满 */
  body.m-p5 .right{display:none;}                 /* p5 机制顺序，铺满 */
  .sushi-wrap{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;}
  .sushi-img{width:100%;height:100%;object-fit:contain;border-radius:8px;}
  .sushi-img.err{display:none;}
  .sushi-missing{display:none;color:var(--dim);font-size:clamp(14px,3vh,24px);font-weight:700;text-align:center;padding:24px;line-height:1.6;}
  .sushi-img.err + .sushi-missing{display:block;}
  .brand{font-size:clamp(11px,1.9vh,15px);color:var(--dim);font-weight:700;}
  .hint{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;text-align:center;
    border:2px dashed var(--line);border-radius:13px;color:var(--dim);
    font-size:clamp(18px,4vh,30px);font-weight:800;line-height:1.5;}

  /* ===== 黑洞 ===== */
  .rgrps{flex:1;min-height:0;display:flex;flex-direction:column;gap:10px;}
  .rgrp{flex:1;min-height:0;display:flex;flex-direction:column;gap:5px;}
  .rgrp-h{font-size:clamp(13px,2.2vh,18px);font-weight:800;}
  .rgrp-btns{flex:1;min-height:0;display:flex;gap:8px;}
  .role-btn{flex:1;min-width:0;border:3px solid var(--line);border-radius:14px;background:var(--panel);
    color:var(--txt);cursor:pointer;font-size:clamp(20px,4.6vh,40px);font-weight:900;}
  .role-btn.on{box-shadow:0 0 0 3px #fff inset;}
  .bhead{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;}
  .bhead b{font-size:clamp(22px,4.8vh,44px);}
  .bhead span{font-size:clamp(12px,2.1vh,17px);color:var(--dim);font-weight:700;}
  .tl{flex:1;min-height:0;display:flex;flex-direction:column;gap:7px;}
  .tl-row{flex:1;min-height:0;display:flex;gap:8px;align-items:stretch;}
  .tl-rname{flex:none;width:clamp(60px,11vw,104px);display:flex;align-items:center;justify-content:center;
    border:2px solid var(--line);border-radius:11px;background:var(--panel2);
    font-size:clamp(18px,3.8vh,32px);font-weight:900;color:#9fb0c4;}
  .tl-row.active .tl-rname{border-color:#5a6b82;background:#26344a;color:#fff;}
  .tl-rname small{display:block;font-size:.5em;color:var(--dim);font-weight:700;margin-top:2px;}
  .bhcard{flex:1;min-height:0;display:flex;flex-direction:column;gap:5px;border:2px solid var(--line);border-radius:12px;padding:6px 9px;background:#0e131b;}
  .bhpre{flex:none;display:flex;flex-wrap:wrap;align-items:center;gap:5px 7px;font-size:clamp(13px,2.4vh,20px);color:#c4cfdc;font-weight:700;line-height:1.25;}
  .bhpre .bhm{background:var(--panel2);border:1px solid #3a4758;border-radius:8px;padding:3px 10px;}
  .bhpre i{color:#5c6c82;font-style:normal;}
  .bhtail{flex:none;display:flex;align-items:center;gap:8px;font-size:clamp(13px,2.4vh,20px);color:#c4cfdc;font-weight:700;}
  .bhtail::before{content:"↳ 第4轮后";color:var(--dim);font-weight:600;font-size:.8em;}
  .bhtail .bhm{background:var(--panel2);border:1px solid #3a4758;border-radius:8px;padding:3px 10px;}
  .tl-waves{flex:1;min-width:0;display:flex;gap:6px;}
  .wave{flex:1;min-width:0;border:2px solid var(--line);border-radius:10px;background:var(--panel);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:4px;text-align:center;}
  .wave .wv-h{font-size:clamp(11px,1.9vh,15px);color:var(--dim);font-weight:700;}
  .wave .wv-x{font-size:clamp(11px,1.9vh,15px);color:#566;font-weight:600;}
  .wave.catch{border-width:3px;}
  .wave.catch .wv-h{color:var(--txt);}
  .wave.catch .wv-g{font-size:clamp(16px,3.3vh,30px);font-weight:900;line-height:1.05;}
  .wave.catch .wv-n{font-size:clamp(10px,1.8vh,14px);color:var(--txt);font-weight:700;line-height:1.2;}
  .wave.hold{border-style:dashed;}
  .wave.hold .wv-g2{font-size:clamp(14px,2.9vh,24px);font-weight:800;}
  .wave.hold .wv-n{font-size:clamp(10px,1.7vh,13px);color:var(--dim);font-weight:600;}
  .wave.handoff{opacity:.78;}
  .wave.handoff .wv-g2{font-size:clamp(13px,2.7vh,21px);font-weight:800;color:#8a99ad;}
  .wave.handoff .wv-n{font-size:clamp(10px,1.7vh,13px);color:var(--dim);font-weight:600;}

  /* ===== P4 ===== */
  .reset button{width:100%;border:3px solid #6a4a2a;border-radius:14px;background:#241a10;
    color:#f2cf8a;cursor:pointer;min-height:7vh;font-size:clamp(16px,3vh,26px);font-weight:900;}
  .p4block{flex:1;min-height:0;display:flex;gap:10px;}
  .p4col{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px;}
  .p4gap{flex:none;display:flex;align-items:center;gap:10px;color:var(--dim);font-size:clamp(11px,2vh,16px);font-weight:800;margin:2px 0;}
  .p4gap::before,.p4gap::after{content:"";flex:1;height:2px;background:var(--line);}
  .p4icerow{flex:none;min-height:21vh;display:flex;gap:8px;}
  .p4row{flex:1;min-height:0;display:flex;flex-direction:column;gap:3px;}
  .p4lbl{flex:none;text-align:center;font-size:clamp(11px,1.9vh,16px);font-weight:800;color:var(--dim);}
  .p4pair{flex:1;min-height:0;display:flex;gap:6px;}
  .p4btn{flex:1;min-width:0;border:2px solid var(--line);border-radius:10px;background:var(--panel);
    color:var(--txt);cursor:pointer;font-size:clamp(16px,3.2vh,28px);font-weight:800;padding:2px;}
  .p4btn.on{border-color:var(--gold);background:#3a3420;color:#ffe699;box-shadow:0 0 0 2px var(--gold) inset;}
  .p4btn.tt{border-color:#3a6aa0;color:#9fcbff;}
  .p4btn.ff{border-color:#a8514a;color:#ff9b90;}
  .p4btn.tt.on{border-color:#4aa3ff;background:#15365e;color:#dcebff;box-shadow:0 0 0 3px #4aa3ff inset;}
  .p4btn.ff.on{border-color:#e0574a;background:#4a1d18;color:#ffd6cf;box-shadow:0 0 0 3px #e0574a inset;}
  .p4out{flex:1;min-height:0;display:flex;flex-direction:column;gap:5px;}
  .p4line{flex:1;min-height:0;display:flex;align-items:center;gap:10px;border:2px solid var(--line);
    border-radius:10px;background:var(--panel);padding:4px 12px;}
  .p4line.filled{border-color:#46566c;background:var(--panel2);}
  .p4n{flex:none;width:1.5em;height:1.5em;border-radius:50%;background:var(--panel2);border:2px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:clamp(13px,2.2vh,18px);font-weight:800;color:var(--dim);}
  .p4cat{flex:none;width:clamp(28px,5vw,46px);font-size:clamp(11px,1.8vh,15px);color:var(--dim);font-weight:700;}
  .p4t{flex:1;min-width:0;font-size:clamp(20px,4.8vh,42px);font-weight:900;}
  .p4t.empty{color:#39434f;font-weight:600;font-size:clamp(14px,2.4vh,20px);}
  .p4suf{font-size:.58em;color:var(--dim);font-weight:700;}
  .p4sw{font-weight:900;}
  .p4steel{color:#e0574a;} .p4ring{color:#4aa3ff;} .p4stone{color:var(--gold);}
  .p4me{flex:none;display:flex;align-items:center;justify-content:center;gap:16px;border:3px solid var(--line);border-radius:13px;padding:6px 16px;min-height:13vh;}
  .p4me.wait{justify-content:center;text-align:center;color:var(--dim);font-size:clamp(16px,3.2vh,26px);font-weight:800;}
  .p4me.still{border-color:#4aa3ff;background:#10243b;}
  .p4me.move{border-color:#ff8a3c;background:#2e1d10;}
  .p4me-k{flex:none;font-size:clamp(40px,11vh,104px);font-weight:900;line-height:1;}
  .p4me.still .p4me-k{color:#7cc0ff;} .p4me.move .p4me-k{color:#ffac6b;}
  .p4me-d{font-size:clamp(14px,2.7vh,24px);font-weight:800;line-height:1.3;}

  /* ===== 猜拳 RPS ===== */
  .rps-pick{flex:1;min-height:0;display:flex;flex-direction:column;gap:10px;}
  .rps-btn{flex:1;min-height:0;border:3px solid var(--line);border-radius:16px;background:var(--panel);
    color:var(--txt);cursor:pointer;font-size:clamp(26px,6vh,52px);font-weight:900;}
  .rps-btn.sel{border-color:var(--gold);background:#3a3420;color:#ffe699;box-shadow:0 0 0 3px var(--gold) inset;}
  .rps-btn.dis{opacity:.4;}
  .rps-score{flex:none;display:flex;align-items:center;justify-content:center;gap:18px;font-size:clamp(28px,7vh,64px);font-weight:900;}
  .rps-score .me{color:#4aa3ff;} .rps-score .op{color:#ff8a3c;} .rps-score .vs{color:var(--dim);}
  .rps-stage{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;gap:14px;border:2px dashed var(--line);border-radius:16px;padding:10px;}
  .rps-stage.reveal.win{border-color:#2ea043;background:#0f2417;border-style:solid;}
  .rps-stage.reveal.lose{border-color:#e0574a;background:#2a1512;border-style:solid;}
  .rps-stage.reveal.draw{border-color:#8a99ad;background:#1a2230;border-style:solid;}
  .rps-side{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .rps-side-h{font-size:clamp(14px,2.6vh,22px);color:var(--dim);font-weight:800;}
  .rps-hand{font-size:clamp(56px,17vh,150px);line-height:1;}
  .rps-hand.dim{opacity:.45;}
  .rps-mid{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0;}
  .rps-res{font-size:clamp(22px,5vh,44px);font-weight:900;text-align:center;}
  .rps-res.dim{color:var(--dim);font-weight:800;font-size:clamp(16px,3.2vh,26px);}
  .rps-vs{font-size:clamp(15px,3vh,24px);color:var(--dim);font-weight:800;}
  .rps-tip{text-align:center;color:var(--dim);font-size:clamp(18px,4vh,30px);font-weight:800;line-height:1.5;}
  .rps-tip span{font-size:.7em;}
  .rps-next{flex:none;}
  .rps-next button{width:100%;border:3px solid var(--next);border-radius:14px;background:#13283f;color:#cfe6ff;cursor:pointer;min-height:8vh;font-size:clamp(18px,3.6vh,28px);font-weight:900;}
  .rps-need{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;color:var(--dim);font-size:clamp(18px,4vh,30px);font-weight:800;line-height:1.6;border:2px dashed var(--line);border-radius:16px;padding:20px;}
  .rps-need-emoji{font-size:clamp(48px,12vh,110px);}

  /* ===== P5 机制顺序 ===== */
  .p5wrap{flex:1;min-height:0;display:flex;flex-direction:column;gap:5px;width:100%;max-width:660px;margin:0 auto;}
  .p5row{flex:1;min-height:0;display:flex;align-items:center;gap:16px;border:2px solid var(--line);border-radius:10px;background:var(--panel);padding:2px 16px;}
  .p5row.hl{background:#3a1f24;border-color:#a8514a;}
  .p5t{flex:none;width:clamp(56px,9vw,82px);font-size:clamp(16px,3.2vh,26px);font-weight:800;color:var(--dim);}
  .p5row.hl .p5t{color:#ffb3aa;}
  .p5m{flex:1;min-width:0;font-size:clamp(18px,3.8vh,30px);font-weight:900;}
  .p5row.hl .p5m{color:#ff9b90;}
</style>
</head>
<body>

<div class="tabs">
  <button class="tab" data-mode="sushi">sushi</button>
  <button class="tab" data-mode="blackhole">黑洞接线</button>
  <button class="tab" data-mode="p4">P4 报点</button>
  <button class="tab" data-mode="p5">p5</button>
  <button class="tab" data-mode="rps">猜拳</button>
  <button class="linkbtn" id="roomBtn" title="联机同步：和朋友共享 P4 / 猜拳">联机</button>
</div>
<div class="app">
  <div class="left" id="leftPanel"></div>
  <div class="right" id="rightPanel"></div>
</div>

<script>
/* ============================================================
   联机同步配置（可选）— 填好后「联机」按钮即可与朋友共享 P4 报点状态
   1) console.firebase.google.com → 新建项目（可关掉 Analytics）
   2) 构建 → Realtime Database → 创建数据库 → 选离你近的区域 → 锁定模式
   3) ⚙ 项目设置 → 你的应用 → Web(</>) → 注册 → 复制 firebaseConfig
      （务必包含 databaseURL，否则联机无效）
   4) 用你的 firebaseConfig 替换下面这个对象
   5) Realtime Database → 规则 标签 → 粘贴并发布：
      { "rules": { "rooms": { "$room": { ".read": true, ".write": true } } } }
   不填则「联机」按钮提示未配置，其余功能照常离线可用。
   ============================================================ */
const FIREBASE_CFG = {
  apiKey: "AIzaSyCWgICRE-RBFKF48xoX6stCGCtaJzLnZb4",
  authDomain: "umad-bed82.firebaseapp.com",
  databaseURL: "https://umad-bed82-default-rtdb.firebaseio.com",
  projectId: "umad-bed82",
  storageBucket: "umad-bed82.firebasestorage.app",
  messagingSenderId: "349462958163",
  appId: "1:349462958163:web:fbfc32b3610a5f4fbbb6a6"
};

/* ================= 黑洞数据 ================= */
const GROUPS=[
  {name:'攻击',color:'var(--atk)',roles:['攻击1','攻击2','攻击3']},
  {name:'锁链',color:'var(--chn)',roles:['锁链1','锁链2','锁链3']},
  {name:'禁止',color:'var(--ban)',roles:['禁止1','禁止2']},
];
const groupColor=r=>GROUPS.find(g=>g.roles.includes(r)).color;
const ROUNDS={1:[{w:1,lines:1},{w:2,lines:2}], 2:[{w:1,lines:3},{w:2,lines:1},{w:3,lines:1}],
  3:[{w:1,lines:3},{w:2,lines:1},{w:3,lines:1}], 4:[{w:1,lines:2},{w:2,lines:1}]};
const PLAN={
  std:{
    '攻击1':{1:{catch:{2:'接这2根'}}, 2:{catch:{1:'3根·接1根'},handoffAt:2,takenBy:'锁链1'}},
    '攻击2':{1:{catch:{1:'接这1根'}}, 2:{catch:{1:'3根·接1根'},handoffAt:3,takenBy:'锁链2'}},
    '攻击3':{2:{catch:{1:'3根·接1根'},toEnd:true}},
    '锁链1':{2:{catch:{2:'接「攻击1」的线'},toEnd:true}, 3:{catch:{1:'3根·接1根'},handoffAt:2,takenBy:'禁止1'}},
    '锁链2':{2:{catch:{3:'接「攻击2」的线'},toEnd:true}, 3:{catch:{1:'3根·接1根'},handoffAt:3,takenBy:'禁止2'}},
    '锁链3':{3:{catch:{1:'3根·接1根'},toEnd:true}},
    '禁止1':{3:{catch:{2:'接「锁链1」的线'},toEnd:true}, 4:{catch:{2:'接这1根'}}},
    '禁止2':{3:{catch:{3:'接「锁链2」的线'},toEnd:true}, 4:{catch:{1:'接这2根'}}},
  },
};
const planOf=role=>PLAN.std[role];
/* 黑洞战斗流程：每个黑洞前的前置机制 */
const BH_FLOW=[
  {pre:['暴雷1 死刑','决战 防火墙','暴雷2 死刑','地震 清血','卡夫卡半场刀'], round:1},
  {pre:['暴雷3 死刑','卡奥斯前刀 + 凯夫卡半场刀'], round:2},
  {pre:['卡奥斯前刀 + 凯夫卡辣尾','暴雷4 死刑'], round:3},
  {pre:['卡奥斯经纬 + 凯夫卡半场刀'], round:4, post:true},
];
/* 黑洞每轮固定 3 列（按激光时点） */
const BH_WAVES=[{w:1,lab:'第一条线'},{w:2,lab:'1激光后'},{w:3,lab:'2激光后'}];
function waveStatus(rd,w,lastW){
  if(!rd) return 'none';
  const cw=Object.keys(rd.catch).map(Number), minC=Math.min(...cw);
  if(rd.catch[w]!=null) return 'catch';
  if(rd.handoffAt===w) return 'handoff';
  if(rd.handoffAt!=null) return (w>minC && w<rd.handoffAt)?'hold':'none';
  return (rd.toEnd && w>minC && w<=lastW)?'hold':'none';
}

/* ================= P4 数据（移植 P4Callouts.py） ================= */
/* 剑: 真=静剑(雷出·背对), 假=动剑(水出·面对) */
const P4BTN={
  my1:{label:'1动静'}, my2:{label:'2动静'},
  A:{label:'真',out:'雷出',sec:'背对 <span class="p4stone">石化出</span>',sword:'静'}, B:{label:'假',out:'水出',sec:'面对 <span class="p4stone">石化进</span>',sword:'动'},
  C:{label:'短'}, D:{label:'长'},
  E:{label:'真',out:'雷出',sec:'背对 <span class="p4stone">石化出</span>',sword:'静'}, F:{label:'假',out:'水出',sec:'面对 <span class="p4stone">石化进</span>',sword:'动'},
  zh:{label:'真',out:'<span class="p4steel">钢铁</span>'}, jh:{label:'假',out:'<span class="p4ring">月环</span>'},
  zs:{label:'真',out:'<span class="p4ring">月环</span>'}, js:{label:'假',out:'<span class="p4steel">钢铁</span>'},
  zl:{label:'真'}, jl:{label:'假'}, zl2:{label:'真'}, jl2:{label:'假'},
  zb:{label:'真'}, jb:{label:'假'}, zb2:{label:'真'}, jb2:{label:'假'},
};
/* 机制1（同一区块）：剑组 | 火水，两列并列 */
const P4TOP=[
  [ {label:'我的剑',pair:['my1','my2']},
    {label:'1动静',pair:['A','B']}, {label:'一水雷',pair:['C','D']}, {label:'2动静',pair:['E','F']} ],
  [ {label:'火',pair:['zh','jh']}, {label:'水',pair:['zs','js']} ],
];
/* 机制2（间隔后）：雷冰雷冰 */
const P4ICE=[ {label:'雷①',pair:['zl','jl']}, {label:'冰①',pair:['zb','jb']}, {label:'雷②',pair:['zl2','jl2']}, {label:'冰②',pair:['zb2','jb2']} ];
const P4PARTNER={}; [...P4TOP.flat(), ...P4ICE].forEach(r=>{ P4PARTNER[r.pair[0]]=r.pair[1]; P4PARTNER[r.pair[1]]=r.pair[0]; });
function p4PairHtml(row){
  let h='<div class="p4row"><div class="p4lbl">'+row.label+'</div><div class="p4pair">';
  row.pair.forEach(id=>{ const on=P.sel[id]?' on':'', lab=P4BTN[id].label;
    const kind = lab==='真'?' tt':(lab==='假'?' ff':'');
    const txt = lab==='假'?'假?':lab;
    h+='<button class="p4btn'+kind+on+'" data-p4="'+id+'">'+txt+'</button>'; });
  return h+'</div></div>';
}
function p4Output(){
  const sel=P.sel, pick=(a,b)=> sel[a]?a:(sel[b]?b:null);
  const lines=['','','','','','',''];           // index 0..6 = 行 1..7
  const ab=pick('A','B'), zhjh=pick('zh','jh'), zsjs=pick('zs','js'), ef=pick('E','F');
  const l1=pick('zl','jl'), l2=pick('zl2','jl2'), i1=pick('zb','jb'), i2=pick('zb2','jb2');
  if(zhjh) lines[2]=P4BTN[zhjh].out;
  if(zsjs) lines[5]=P4BTN[zsjs].out;
  if(sel.C){ if(ab){ lines[0]=P4BTN[ab].out; lines[1]=P4BTN[ab].sec; } if(ef){ lines[3]=P4BTN[ef].out; lines[4]=P4BTN[ef].sec; } }
  if(sel.D){ if(ab){ lines[3]=P4BTN[ab].out; lines[1]=P4BTN[ab].sec; } if(ef){ lines[0]=P4BTN[ef].out; lines[4]=P4BTN[ef].sec; } }
  let lr='', ir='';
  if(l1&&l2) lr = ((l1==='zl')===(l2==='zl2')) ? '真雷':'假雷';
  if(i1&&i2) ir = ((i1==='zb')===(i2==='zb2')) ? '真冰':'假冰';
  if(lr&&ir) lines[6]=ir+lr;
  return lines;
}
function p4MyState(){
  const sel=P.sel, my = sel.my1?1:(sel.my2?2:null);
  if(!my) return {my:null};
  const pr = my===1?['A','B']:['E','F'], pk = sel[pr[0]]?pr[0]:(sel[pr[1]]?pr[1]:null);
  if(!pk) return {my, sword:null};
  return {my, sword:P4BTN[pk].sword, tf:(pk===pr[0]?'真':'假'), out:P4BTN[pk].out, sec:P4BTN[pk].sec};
}
function p4toggle(id){ if(P.sel[id]) return; const p=P4PARTNER[id]; if(p) delete P.sel[p]; P.sel[id]=true; }

/* ================= 状态 + 主渲染 ================= */
let mode = location.hash==='#bh' ? 'blackhole' : location.hash==='#p4' ? 'p4' : location.hash==='#p5' ? 'p5' : location.hash==='#rps' ? 'rps' : 'sushi';
const B = {role:null};
const P = {sel:{}};
const $ = s=>document.querySelector(s);

function render(){
  document.body.className='m-'+mode;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on', t.dataset.mode===mode));
  if(mode==='blackhole') renderBlackhole(); else if(mode==='p4') renderP4(); else if(mode==='p5') renderP5(); else if(mode==='rps') renderRPS(); else renderSushi();
}
function renderSushi(){
  $('#leftPanel').innerHTML='<div class="sushi-wrap"><img class="sushi-img" src="sushi.png?v=1" alt="sushi" onerror="this.classList.add(\'err\')"><div class="sushi-missing">把这张图存成 <b>GitRepo/sushi.png</b>（与 p2.html 同目录）即可显示</div></div>';
  $('#rightPanel').innerHTML='';
}

/* ---- 黑洞 ---- */
function renderBlackhole(){
  let C='<div class="brand">黑洞接线 · <b style="color:var(--gold)">变体打法</b>｜选号位 · 接线后持线到「被接走 / 本轮结束」（跨轮重置）</div><div class="rgrps">';
  GROUPS.forEach(g=>{ C+='<div class="rgrp"><div class="rgrp-h" style="color:'+g.color+'">'+g.name+'</div><div class="rgrp-btns">';
    g.roles.forEach(r=>{ const on=B.role===r;
      C+='<button class="role-btn'+(on?' on':'')+'" data-role="'+r+'" style="border-color:'+g.color+(on?';background:'+g.color+'22':'')+'">'+r+'</button>'; });
    C+='</div></div>'; });
  C+='</div>';
  const plan=B.role?planOf(B.role):null, col=B.role?groupColor(B.role):'#8a99ad';
  let R='<div class="bhead">'+(B.role
      ? '<b style="color:'+col+'">'+B.role+'</b><span>黑洞流程 · 你每轮接线（灰块＝前置机制）</span>'
      : '<b>黑洞流程</b><span>右侧选号位 → 看你每轮接线</span>')+'</div><div class="tl">';
  BH_FLOW.forEach(stage=>{
    R+='<div class="bhcard"><div class="bhpre">'+stage.pre.map(m=>'<span class="bhm">'+m+'</span>').join('<i>›</i>')+'</div>';
    const r=stage.round, waves=ROUNDS[r], lastW=waves[waves.length-1].w, rd=plan?plan[r]:null;
    R+='<div class="tl-row'+(rd?' active':'')+'"><div class="tl-rname">第'+r+'轮</div><div class="tl-waves">';
    BH_WAVES.forEach(({w,lab})=>{ const wv=waves.find(x=>x.w===w);
      if(!wv){ R+='<div class="wave"><div class="wv-h">'+lab+'</div><div class="wv-x">—</div></div>'; return; }
      const st=plan?waveStatus(rd,w,lastW):'none';
      if(st==='catch'){ R+='<div class="wave catch" style="border-color:'+col+';background:'+col+'26"><div class="wv-h" style="color:'+col+'">'+lab+'</div><div class="wv-g" style="color:'+col+'">接线</div><div class="wv-n">'+rd.catch[w]+'</div></div>'; }
      else if(st==='hold'){ R+='<div class="wave hold" style="border-color:'+col+'99"><div class="wv-h">'+lab+'</div><div class="wv-g2" style="color:'+col+'">保持</div><div class="wv-n">'+(w===lastW?'持到本轮结束':'持线中')+'</div></div>'; }
      else if(st==='handoff'){ R+='<div class="wave handoff"><div class="wv-h">'+lab+'</div><div class="wv-g2">交出</div><div class="wv-n">「'+rd.takenBy+'」接走</div></div>'; }
      else{ R+='<div class="wave"><div class="wv-h">'+lab+'</div><div class="wv-x">'+wv.lines+'根</div></div>'; }
    });
    R+='</div></div></div>';
  });
  R+='<div class="bhtail"><span class="bhm">凯夫卡辣尾</span></div>';
  R+='</div>';
  $('#rightPanel').innerHTML=C; $('#leftPanel').innerHTML=R;
}

/* ---- P4 ---- */
function renderP4(){
  let C='<div class="brand">P4 报点 · 每组二选一（点另一个切换 · ↺重置清空）</div><div class="p4block">';
  P4TOP.forEach(col=>{ C+='<div class="p4col">'; col.forEach(row=>{ C+=p4PairHtml(row); }); C+='</div>'; });
  C+='</div><div class="p4gap">间隔后 · 雷冰</div><div class="p4icerow">';
  P4ICE.forEach(row=>{ C+=p4PairHtml(row); });
  C+='</div><div class="reset"><button data-act="p4reset">↺ 重置</button></div>';
  // 左：我的动静大提示 + 7 行
  const ms=p4MyState();
  let banner;
  if(!ms.my){ banner='<div class="p4me wait">先在右侧选「我的剑」(1动静 / 2动静)</div>'; }
  else if(!ms.sword){ banner='<div class="p4me wait">再选「'+ms.my+'动静」是 真 还是 假</div>'; }
  else{ banner='<div class="p4me '+(ms.sword==='静'?'still':'move')+'"><span class="p4me-k">'+ms.sword+'</span></div>'; }
  const lines=p4Output(), cat=['出','面向','火','出','面向','水','冰雷'];
  let R=banner+'<div class="p4out">';
  lines.forEach((t,i)=>{
    R+='<div class="p4line'+(t?' filled':'')+'"><span class="p4n">'+(i+1)+'</span>'
      +'<span class="p4cat">'+cat[i]+'</span>'
      +'<span class="p4t'+(t?'':' empty')+'">'+(t||'—')+'</span></div>';
  });
  R+='</div>';
  $('#rightPanel').innerHTML=C; $('#leftPanel').innerHTML=R;
}

  {t:'00:08', m:'四连AOE'},
  {t:'00:14', m:'职能平A×3', hl:1},
  {t:'00:25', m:'洪水'},

  {t:'02:22', m:'职能平A×3', hl:1},
  {t:'02:40', m:'遗弃末世'},
];
function renderP5(){

  P5.forEach(e=>{ h+='<div class="p5row'+(e.hl?' hl':'')+'"><span class="p5t">'+e.t+'</span><span class="p5m">'+e.m+'</span></div>'; });

/* ---- 猜拳 RPS ---- */
const CID = (()=>{ try{ let c=localStorage.getItem('p2cid'); if(!c){ c=Math.random().toString(36).slice(2,10); localStorage.setItem('p2cid',c); } return c; }catch(_){ return 'c'+Math.floor(Math.random()*1e9); } })();
const G = { round:1, picks:{}, wins:{} };   // 本地镜像 rooms/<code>/rps
let myCountedRound = 0;
const RPS_BEATS = { rock:'scissors', scissors:'paper', paper:'rock' };   // 键 克 值
const RPS_LABEL = { rock:'✊ 石头', scissors:'✌ 剪刀', paper:'✋ 布' };
const RPS_HAND  = { rock:'✊', scissors:'✌', paper:'✋' };
function rpsOppCid(){ for(const k in G.picks){ if(k!==CID) return k; } for(const k in G.wins){ if(k!==CID) return k; } return null; }
function rpsResult(){ const me=G.picks[CID], op=rpsOppCid(), om=op?G.picks[op]:null;
  if(!me||!om) return null; if(me===om) return 'draw'; return RPS_BEATS[me]===om ? 'win':'lose'; }
function renderRPS(){
  if(!roomCode){
    $('#leftPanel').innerHTML='<div class="rps-need"><div class="rps-need-emoji">✊ ✌ ✋</div><div>双人猜拳<br>先点右上角 <b>「联机」</b> 进同一个房间<br>两人各自出拳，都出后自动判定</div></div>';
    $('#rightPanel').innerHTML=''; return;
  }
  const me=G.picks[CID], op=rpsOppCid(), om=op?G.picks[op]:null, both=!!(me&&om);
  const myW=G.wins[CID]||0; let opW=0; for(const k in G.wins){ if(k!==CID) opW+=G.wins[k]; }
  let C='<div class="brand">猜拳 · 房间 '+roomCode+'｜各自出拳，双方都出后判定</div><div class="rps-pick">';
  ['rock','scissors','paper'].forEach(m=>{ const sel=me===m?' sel':'', dis=me?' dis':'';
    C+='<button class="rps-btn'+sel+dis+'" data-rps="'+m+'"'+(me?' disabled':'')+'>'+RPS_LABEL[m]+'</button>'; });
  C+='</div><div class="reset"><button data-act="rpsreset">↺ 重置比分</button></div>';
  let R='<div class="rps-score"><span class="me">你 '+myW+'</span><span class="vs">:</span><span class="op">'+opW+' 对方</span></div>';
  if(both){ const r=rpsResult(), txt=r==='win'?'🎉 你赢了':r==='lose'?'😶 你输了':'🤝 平局';
    R+='<div class="rps-stage reveal '+r+'">'
      +'<div class="rps-side"><div class="rps-side-h">你</div><div class="rps-hand">'+RPS_HAND[me]+'</div></div>'
      +'<div class="rps-mid"><div class="rps-res">'+txt+'</div><div class="rps-vs">VS</div></div>'
      +'<div class="rps-side"><div class="rps-side-h">对方</div><div class="rps-hand">'+RPS_HAND[om]+'</div></div>'
      +'</div><div class="rps-next"><button data-act="rpsnext">下一局 ▶</button></div>';
  } else if(me){
    R+='<div class="rps-stage waiting">'
      +'<div class="rps-side"><div class="rps-side-h">你</div><div class="rps-hand">'+RPS_HAND[me]+'</div></div>'
      +'<div class="rps-mid"><div class="rps-res dim">等对方出拳…</div></div>'
      +'<div class="rps-side"><div class="rps-side-h">对方</div><div class="rps-hand dim">？</div></div></div>';
  } else {
    const oppPicked=!!(op&&G.picks[op]);
    R+='<div class="rps-stage idle"><div class="rps-tip">'+(oppPicked?'对方已出拳 ✅<br>轮到你 →':'在右侧出拳 →<br><span>石头 / 剪刀 / 布</span>')+'</div></div>';
  }
  $('#rightPanel').innerHTML=C; $('#leftPanel').innerHTML=R;
}

/* ================= 事件 ================= */
document.addEventListener('click', e=>{
  const tab=e.target.closest('[data-mode]'); if(tab){ mode=tab.dataset.mode; render(); return; }
  // 黑洞
  const rb=e.target.closest('[data-role]'); if(rb){ B.role=rb.dataset.role; render(); return; }
  // P4
  const p4=e.target.closest('[data-p4]'); if(p4){ p4toggle(p4.dataset.p4); render(); return; }
  const p4r=e.target.closest('[data-act="p4reset"]'); if(p4r){ P.sel={}; render(); return; }
  // 猜拳
  const rp=e.target.closest('[data-rps]'); if(rp){ if(roomCode&&rpsRef&&!G.picks[CID]){ G.picks[CID]=rp.dataset.rps; rpsRef.child('picks/'+CID).set(G.picks[CID]); render(); } return; }
  const rn=e.target.closest('[data-act="rpsnext"]'); if(rn){ if(roomCode&&rpsRef){ const nr=G.round+1; G.round=nr; G.picks={}; rpsRef.update({round:nr, picks:null}); render(); } return; }
  const rr=e.target.closest('[data-act="rpsreset"]'); if(rr){ if(roomCode&&rpsRef){ G.round=1; G.picks={}; G.wins={}; myCountedRound=0; rpsRef.set({round:1,picks:{},wins:{}}); render(); } return; }
});

/* ================= 联机同步（Firebase 实时数据库 · 可选） =================
   共享 = P4 真相(除"我的剑"外的全部)；
   个人 = 黑洞号位 B.role、P4 my1/my2、当前标签 —— 不进房间则零影响、离线照常。*/
let roomCode=null, p4Ref=null, rpsRef=null;
let applyingRemote=false, p4Hydrated=false;
let lastP4='';

function p4Shared(){ const o={}; for(const k in P.sel){ if(k!=='my1'&&k!=='my2') o[k]=true; } return o; }
function pushP4(){ if(!roomCode||applyingRemote) return;
  const o=p4Shared(), s=JSON.stringify(o);
  if(s!==lastP4){ lastP4=s; p4Ref.set(o); } }
function pushShared(){ pushP4(); }

function applyP4(v){ applyingRemote=true;
  if(v==null && !p4Hydrated){ p4Hydrated=true; applyingRemote=false; pushP4(); return; }
  p4Hydrated=true;
  const m1=P.sel.my1, m2=P.sel.my2; P.sel={};               // 合并：清旧共享真相，保留个人"我的剑"
  if(m1)P.sel.my1=true; if(m2)P.sel.my2=true;
  if(v) for(const k in v){ if(k!=='my1'&&k!=='my2') P.sel[k]=true; }
  lastP4=JSON.stringify(p4Shared());
  render(); applyingRemote=false; }

/* 猜拳：粒度写(picks/<id>、wins/<id>)避免并发覆盖；赢家只给自己计分一次 */
function rpsSelfScore(){ const r=rpsResult();
  if(r && myCountedRound!==G.round){ myCountedRound=G.round;
    if(r==='win' && rpsRef){ rpsRef.child('wins/'+CID).set((G.wins[CID]||0)+1); } } }
function applyRPS(v){ G.round=(v&&v.round)||1; G.picks=(v&&v.picks)||{}; G.wins=(v&&v.wins)||{};
  if(G.round<myCountedRound) myCountedRound=0;   // 回合数回退=重置/新局 → 允许重新计分
  if(rpsRef) rpsSelfScore();
  if(mode==='rps') render(); }

function loadFirebase(){ return new Promise((res,rej)=>{
  if(typeof firebase!=='undefined' && firebase.database) return res();
  const urls=['https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js',
              'https://www.gstatic.com/firebasejs/12.15.0/firebase-database-compat.js'];
  let i=0; (function next(){ if(i>=urls.length) return res();
    const s=document.createElement('script'); s.src=urls[i++];
    s.onload=next; s.onerror=()=>rej(new Error('load')); document.head.appendChild(s); })(); }); }

async function joinRoom(code){ code=(code||'').trim(); if(!code) return;
  if(!FIREBASE_CFG.databaseURL){ alert('联机未配置：请先在 p2.html 顶部的 FIREBASE_CFG 填入 Firebase 配置（需含 databaseURL），并发布 rooms 数据库规则。'); return; }
  try{
    await loadFirebase();
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CFG);
    const db=firebase.database();
    if(p4Ref) p4Ref.off(); if(rpsRef) rpsRef.off();   // 防止重复进房时旧房间监听泄漏
    roomCode=code; p4Hydrated=false; lastP4=''; myCountedRound=0; G.round=1; G.picks={}; G.wins={};
    p4Ref=db.ref('rooms/'+code+'/p4');
    rpsRef=db.ref('rooms/'+code+'/rps');
    p4Ref.on('value', s=>applyP4(s.val()));
    rpsRef.on('value', s=>applyRPS(s.val()));
    try{ localStorage.setItem('p2room', code); }catch(_){}
    setRoomUrl(code); updateBadge();
  }catch(e){ roomCode=null; p4Ref=null; rpsRef=null; updateBadge(); alert('联机连接失败，继续离线使用。'); } }
function leaveRoom(){ if(p4Ref) p4Ref.off(); if(rpsRef) rpsRef.off();
  roomCode=null; p4Ref=null; rpsRef=null; lastP4=''; p4Hydrated=false;
  myCountedRound=0; G.round=1; G.picks={}; G.wins={};
  try{ localStorage.removeItem('p2room'); }catch(_){}
  clearRoomUrl(); updateBadge(); }
function setRoomUrl(c){ try{ const u=new URL(location.href); u.searchParams.set('room',c); history.replaceState(null,'',u.pathname+u.search+u.hash); }catch(_){} }
function clearRoomUrl(){ try{ const u=new URL(location.href); u.searchParams.delete('room'); history.replaceState(null,'',u.pathname+u.search+u.hash); }catch(_){} }
function updateBadge(){ const b=$('#roomBtn'); if(!b) return;
  b.textContent = roomCode ? ('🟢 '+roomCode) : '联机'; b.classList.toggle('on', !!roomCode); }

/* 包裹 render：每次本地变更后把共享分片广播到房间（个人/标签切换经比对后不写） */
const _render = render;
render = function(){ _render(); pushShared(); };

(function(){ const b=$('#roomBtn'); if(!b) return;
  b.onclick=()=>{ if(roomCode){ if(confirm('退出联机「'+roomCode+'」？')) leaveRoom(); }
    else{ if(!FIREBASE_CFG.databaseURL){ alert('联机未配置：请先在 p2.html 顶部的 FIREBASE_CFG 填入 Firebase 配置。'); return; }
      let last=''; try{ last=localStorage.getItem('p2room')||''; }catch(_){}
      const def = last || Math.random().toString(36).slice(2,8);
      const c=prompt('输入房间码（同一码 = 同一房间，和朋友约定一致）：', def);
      if(c) joinRoom(c); } };
  updateBadge(); })();

render();

/* 分享链接 ?room=xxxx 或上次房间 → 自动进房 */
(function(){ let code=null;
  try{ code=new URLSearchParams(location.search).get('room'); }catch(_){}
  if(!code){ try{ code=localStorage.getItem('p2room'); }catch(_){} }
  if(code && FIREBASE_CFG.databaseURL) joinRoom(code); })();
</script>
