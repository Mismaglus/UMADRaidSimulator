<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>P2 点名助手 · 1238</title>
<style>
  :root{
    --bg:#0c0f14; --panel:#161b24; --panel2:#1d2533; --line:#2b3545;
    --txt:#e8eef6; --dim:#8a99ad;
    --share:#4aa3ff; --spread:#ffd84a; --cone:#ff8a3c;
    --soak:#2ea043; --pad:#3a4452; --aoe:#b06bff; --next:#2f6fb0;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
    font-family:system-ui,"Microsoft YaHei",sans-serif;}
  .app{display:flex;height:100vh;gap:8px;padding:8px;}
  .left{width:40%;max-width:460px;display:flex;flex-direction:column;gap:7px;min-height:0;}
  .right{flex:1;display:flex;flex-direction:column;gap:6px;min-height:0;min-width:0;}
  .brand{font-size:clamp(11px,1.9vh,15px);color:var(--dim);font-weight:700;}

  /* AOE 两列选择 */
  .aoe-pick{flex:1;min-height:0;display:flex;gap:8px;}
  .aoe-col{flex:1;min-height:0;display:flex;flex-direction:column;gap:6px;}
  .aoe-h{text-align:center;font-weight:800;font-size:clamp(13px,2.3vh,19px);line-height:1.1;}
  .aoe-h small{display:block;color:var(--dim);font-size:clamp(9px,1.5vh,12px);font-weight:500;margin-top:2px;}
  .aoe-btn{flex:1;min-height:0;border:3px solid var(--line);border-radius:12px;background:var(--panel);
    color:var(--txt);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    font-weight:900;font-size:clamp(17px,3.4vh,30px);}
  .aoe-btn svg{width:clamp(28px,5.6vh,52px);height:clamp(28px,5.6vh,52px);}

  /* 进度 */
  .progress{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;}
  .pcell{min-height:5.4vh;border:2px solid var(--line);border-radius:7px;background:var(--panel);
    color:var(--txt);font-size:clamp(11px,1.9vh,15px);font-weight:800;cursor:pointer;padding:1px;}
  .pcell.aoe{border-color:var(--aoe);}
  .pcell.soak{border-color:var(--soak);}
  .pcell.pad{border-color:var(--pad);color:var(--dim);}
  .pcell.set{background:var(--panel2);}
  .pcell.cur{box-shadow:0 0 0 3px #fff inset;background:var(--panel2);color:var(--txt);}

  .read-label{font-size:clamp(13px,2.3vh,18px);font-weight:800;color:var(--cone);text-align:center;}

  .pick{flex:1;min-height:0;display:flex;flex-direction:column;gap:7px;}
  .pick-btn{flex:1;min-height:0;border:3px solid var(--line);border-radius:13px;
    background:var(--panel);color:var(--txt);cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:14px;
    font-size:clamp(22px,5vh,40px);font-weight:900;}
  .pick-btn svg{width:clamp(38px,8vh,72px);height:clamp(38px,8vh,72px);flex:none;}
  .pick-btn.on{box-shadow:0 0 0 3px #fff inset;background:var(--panel2);}
  .pick-btn.next{border-color:var(--next);background:#13283f;}
  .bignote{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;text-align:center;
    border:2px dashed var(--line);border-radius:13px;color:var(--soak);font-weight:900;
    font-size:clamp(18px,4vh,28px);}

  .reset button{width:100%;border:2px solid var(--line);border-radius:11px;background:var(--panel);
    color:var(--dim);cursor:pointer;min-height:5vh;font-size:clamp(13px,2.1vh,17px);font-weight:700;}

  .rhead{display:flex;flex-direction:column;}
  .rhead b{font-size:clamp(16px,3vh,26px);}
  .rhead span{font-size:clamp(11px,1.9vh,15px);color:var(--dim);margin-top:2px;}
  .rgo{display:flex;align-items:center;gap:14px;}
  .rgo-ic{width:clamp(46px,10vh,92px);height:clamp(46px,10vh,92px);flex:none;}
  .rgo-text{display:flex;flex-direction:column;min-width:0;}
  .rgo-shape{font-size:clamp(15px,2.6vh,22px);font-weight:800;}
  .rgo-go{font-size:clamp(24px,6.4vh,60px);font-weight:900;line-height:1.04;}
  .rgo-go .lbl{font-size:.42em;color:var(--dim);font-weight:700;vertical-align:middle;margin-right:.2em;}
  .rdiagram{flex:1;min-height:0;}
  .rdiagram svg{width:100%;height:100%;display:block;}
  .hint{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;text-align:center;
    border:2px dashed var(--line);border-radius:13px;color:var(--dim);
    font-size:clamp(18px,4vh,30px);font-weight:800;line-height:1.4;}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="ic-share" viewBox="0 0 100 100">
    <g fill="none" stroke="#4aa3ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <g><polyline points="33.9,24 50,38.3 66.1,24"/><polyline points="33.9,9.7 50,24 66.1,9.7"/></g>
      <g transform="rotate(90 50 50)"><polyline points="33.9,24 50,38.3 66.1,24"/><polyline points="33.9,9.7 50,24 66.1,9.7"/></g>
      <g transform="rotate(180 50 50)"><polyline points="33.9,24 50,38.3 66.1,24"/><polyline points="33.9,9.7 50,24 66.1,9.7"/></g>
      <g transform="rotate(270 50 50)"><polyline points="33.9,24 50,38.3 66.1,24"/><polyline points="33.9,9.7 50,24 66.1,9.7"/></g>
    </g>
  </symbol>
  <symbol id="ic-spread" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="26" fill="none" stroke="#ffd84a" stroke-width="8.5"/>
    <circle cx="50" cy="50" r="9" fill="#ffd84a"/>
  </symbol>
  <symbol id="ic-cone" viewBox="0 0 100 100">
    <path d="M50 78.6 L24 37 Q50 18.8 76 37 Z" fill="#ff8a3c" stroke="#c85a14" stroke-width="3" stroke-linejoin="round"/>
  </symbol>
</svg>

<div class="app">
  <div class="left" id="left"></div>
  <div class="right" id="right"></div>
</div>

<script>
const SOAK = {
  1:{'分摊':'右塔 · 上沿','钢铁':'右塔 · 右下','扇形':'左塔 · 左下'},
  2:{'钢铁':'右塔 · 右下','扇形':'右塔 · 中轴线顶部'},
  3:{'分摊':'右塔 · 上沿','钢铁':'右塔 · 右下','扇形':'左塔 · 左下'},
  4:{'钢铁':'右塔 · 右下','扇形':'右塔 · 中轴线顶部'},
  5:{'分摊':'右塔 · 上沿','钢铁':'右塔 · 右下','扇形':'左塔 · 左下'},
  6:{'钢铁':'右塔 · 右下','扇形':'右塔 · 中轴线顶部'},
  7:{'分摊':'右塔 · 上沿','钢铁':'右塔 · 右下','扇形':'左塔 · 左下'},
  8:{'钢铁':'右塔 · 右下','扇形':'右塔 · 中轴线顶部'},
};
const SOAK_TOWERS = {A:[1,2,3,8], B:[4,5,6,7]};
const FINAL_SOAK  = {A:8, B:7};
const FIRST_SOAK  = {A:1, B:4};
const READS = { A:{0:1, 1:2, 2:3, 3:8}, B:{0:4, 4:5, 5:6, 6:7} };   // cursor → 目标踩塔
const SHAPE = {
  '分摊':{color:'var(--share)', sym:'ic-share'},
  '钢铁':{color:'var(--spread)', sym:'ic-spread'},
  '扇形':{color:'var(--cone)',  sym:'ic-cone'},
};
const POS = {
  '右塔 · 上沿':{x:320,y:138}, '右塔 · 右下':{x:349,y:224}, '左塔 · 左下':{x:131,y:224},
  '右塔 · 中轴线顶部':{x:320,y:152}, '右塔 · 右边':{x:396,y:195},
  '右塔 · 上沿（塔外）':{x:320,y:108},
};
const state = {group:null, cursor:0, picks:{}};
const $ = s=>document.querySelector(s);
const isSoak = (g,t)=> g && SOAK_TOWERS[g].includes(t);
function padInfo(t){
  return (t%2===0)
    ? {action:'引导扇形', loc:'右塔 · 右边', shape:'扇形'}
    : {action:'处理分摊', loc:'右塔 · 上沿（塔外）', shape:'分摊'};
}

function render(){
  const g=state.group, c=state.cursor;
  let L='', R='';

  if(c===0){   /* ---- 开局 AOE：两列合一（组 + 初始点名） ---- */
    L='<div class="brand">P2 遗弃末世 · 点名助手 ｜ 1238 近远分组</div>'
     +'<div class="read-label">开局 AOE：点你的初始点名（自动定组）</div>'
     +'<div class="aoe-pick">'+aoeCol('A')+aoeCol('B')+'</div>';
    R='<div class="rhead"><b>开场 AOE</b><span>左列＝分摊组、右列＝闲人组；点你的初始点名，一步定组+定位</span></div>'
     +'<div class="hint">↙ 选「你的组 + 初始点名」</div>';
  } else {     /* ---- 已开始：组已定 ---- */
    L='<div class="brand">点名助手 ｜ '+(g==='A'?'分摊组（踩 1·2·3·8）':'闲人组（踩 4·5·6·7）')+'</div>';
    L+=progressHtml();
    if(c===8){
      L+='<div class="pick"><div class="bignote">✅ 已是最后一塔</div></div>';
    } else {
      const target=READS[g][c];
      if(target!==undefined){
        L+='<div class="read-label">读新点名 → 塔'+target+'</div>'+pickHtml(target);
      } else {
        L+='<div class="read-label">塔'+c+' · '+(isSoak(g,c)?'踩塔（最后一座·无新点名）':'垫场')+'</div>'
          +'<div class="pick"><button class="pick-btn next" data-act="next">下一塔 ▶</button></div>';
      }
    }
    L+='<div class="reset"><button data-act="reset">↺ 重新开始</button></div>';

    const t=c, isFinal=(FINAL_SOAK[g]===t);
    if(isSoak(g,t)){
      const pick=state.picks[t];
      R='<div class="rhead"><b>塔'+t+' · 踩塔'+(isFinal?'（最后一座）':'')+'</b>'
        +(isFinal?'<span>用你最近读到的点名，本座之后无新点名</span>':'')+'</div>';
      R+= pick ? resultHtml(pick, SOAK[t][pick]) : '<div class="hint">这一座点名还没读<br>点进度条回到对应时机</div>';
    } else {
      const p=padInfo(t);
      R='<div class="rhead"><b>塔'+t+' · 垫场</b><span>'+p.action+'</span></div>'+resultHtml(p.shape, p.loc);
    }
  }
  $('#left').innerHTML=L; $('#right').innerHTML=R;
}

function aoeCol(g){
  const target=FIRST_SOAK[g], name=(g==='A'?'分摊组':'闲人组'), sub=(g==='A'?'踩 1·2·3·8':'踩 4·5·6·7');
  let h='<div class="aoe-col"><div class="aoe-h" style="color:'+(g==='A'?'var(--share)':'var(--cone)')+'">'+name+'<small>'+sub+'</small></div>';
  Object.keys(SOAK[target]).forEach(nm=>{ const sh=SHAPE[nm];
    h+='<button class="aoe-btn" data-g="'+g+'" data-target="'+target+'" data-cb="'+nm+'" style="border-color:'+sh.color+'">'
      +'<svg viewBox="0 0 100 100"><use href="#'+sh.sym+'"/></svg>'
      +'<span style="color:'+sh.color+'">'+nm+'</span></button>';
  });
  return h+'</div>';
}
function progressHtml(){
  const g=state.group; let h='<div class="progress">';
  ['AOE','1','2','3','4','5','6','7','8'].forEach((txt,k)=>{
    let cls='pcell '+(k===0?'aoe':(isSoak(g,k)?'soak':'pad'));
    if(k>0 && isSoak(g,k) && state.picks[k]) cls+=' set';
    if(k===state.cursor) cls+=' cur';
    h+='<button class="'+cls+'" data-cursor="'+k+'">'+txt+'</button>';
  });
  return h+'</div>';
}
function pickHtml(target){
  let h='<div class="pick">';
  Object.keys(SOAK[target]).forEach(name=>{
    const sh=SHAPE[name], on=(state.picks[target]===name)?' on':'';
    h+='<button class="pick-btn'+on+'" data-target="'+target+'" data-cb="'+name+'" style="border-color:'+sh.color+'">'
      +'<svg viewBox="0 0 100 100"><use href="#'+sh.sym+'"/></svg>'
      +'<span style="color:'+sh.color+'">'+name+'</span></button>';
  });
  return h+'</div>';
}
function resultHtml(shape, loc){
  const sh=SHAPE[shape];
  return '<div class="rgo"><svg class="rgo-ic" viewBox="0 0 100 100"><use href="#'+sh.sym+'"/></svg>'
    +'<div class="rgo-text"><div class="rgo-shape" style="color:'+sh.color+'">'+shape+'</div>'
    +'<div class="rgo-go"><span class="lbl">去</span><span style="color:'+sh.color+'">'+loc+'</span></div></div></div>'
    +'<div class="rdiagram">'+diagram(loc, shape)+'</div>';
}
function diagram(loc, shape){
  const sh=SHAPE[shape], p=POS[loc];
  const tower=(cx,cy,name)=>'<circle cx="'+cx+'" cy="'+cy+'" r="58" fill="rgba(90,170,255,0.06)" stroke="#3a4d63" stroke-width="3"/>'
    +'<text x="'+cx+'" y="'+(cy+6)+'" text-anchor="middle" fill="#6b7a8d" font-size="20" font-weight="700">'+name+'</text>';
  let mk='';
  if(p){ mk='<circle cx="'+p.x+'" cy="'+p.y+'" r="30" fill="rgba(255,255,255,0.10)"/>'
    +'<circle cx="'+p.x+'" cy="'+p.y+'" r="26" fill="none" stroke="'+sh.color+'" stroke-width="5">'
    +'<animate attributeName="r" values="22;34;22" dur="1.1s" repeatCount="indefinite"/>'
    +'<animate attributeName="opacity" values="1;0.25;1" dur="1.1s" repeatCount="indefinite"/></circle>'
    +'<use href="#'+sh.sym+'" x="'+(p.x-20)+'" y="'+(p.y-20)+'" width="40" height="40"/>';
  }
  return '<svg viewBox="0 0 450 300" preserveAspectRatio="xMidYMid meet">'
    +'<circle cx="225" cy="46" r="24" fill="#4d2a63" stroke="#b06bff" stroke-width="3"/>'
    +'<text x="225" y="51" text-anchor="middle" fill="#e9d3ff" font-size="15" font-weight="700">BOSS</text>'
    +tower(160,195,'左塔')+tower(320,195,'右塔')+mk+'</svg>';
}

document.addEventListener('click', e=>{
  const pk=e.target.closest('[data-cb]');
  if(pk){
    if(pk.dataset.g){ state.group=pk.dataset.g; state.picks={}; }   // AOE 两列：一步定组
    state.picks[+pk.dataset.target]=pk.dataset.cb;
    state.cursor=Math.min(8,state.cursor+1);
    render(); return;
  }
  const nx=e.target.closest('[data-act="next"]'); if(nx){ state.cursor=Math.min(8,state.cursor+1); render(); return; }
  const pc=e.target.closest('[data-cursor]');     if(pc){ state.cursor=+pc.dataset.cursor; render(); return; }
  const rs=e.target.closest('[data-act="reset"]'); if(rs){ state.cursor=0; state.picks={}; render(); return; }
});
render();
</script>
</body>
</html>
