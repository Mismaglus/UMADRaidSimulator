<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>UMAD 助手 · 踩塔 + 黑洞 + P4</title>
<style>
  :root{
    --bg:#0c0f14; --panel:#161b24; --panel2:#1d2533; --line:#2b3545;
    --txt:#e8eef6; --dim:#8a99ad;
    --share:#4aa3ff; --spread:#ffd84a; --cone:#ff8a3c; --soak:#2ea043; --pad:#3a4452; --aoe:#b06bff; --next:#2f6fb0;
    --atk:#e0654a; --chn:#4aa3ff; --ban:#c77dff; --gold:#ffd966;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
    font-family:system-ui,"Microsoft YaHei",sans-serif;}
  body{display:flex;flex-direction:column;}

  .tabs{display:flex;gap:6px;padding:7px 8px 0;flex:none;}
  .tab{flex:1;text-align:center;padding:9px;border-radius:11px 11px 0 0;border:2px solid var(--line);border-bottom:none;
    background:var(--panel);color:var(--dim);font-weight:800;font-size:clamp(15px,2.7vh,23px);cursor:pointer;}
  .tab.on{background:var(--panel2);color:var(--txt);border-color:#46566c;}

  .app{flex:1;min-height:0;display:flex;gap:8px;padding:8px;}
  .left{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px;min-height:0;}
  .right{width:40%;max-width:460px;display:flex;flex-direction:column;gap:8px;min-height:0;}
  .brand{font-size:clamp(11px,1.9vh,15px);color:var(--dim);font-weight:700;}
  .hint{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;text-align:center;
    border:2px dashed var(--line);border-radius:13px;color:var(--dim);
    font-size:clamp(18px,4vh,30px);font-weight:800;line-height:1.5;}

  /* ===== 踩塔 ===== */
  .aoe-pick{flex:1;min-height:0;display:flex;gap:8px;}
  .aoe-col{flex:1;min-height:0;display:flex;flex-direction:column;gap:6px;}
  .aoe-h{text-align:center;font-weight:800;font-size:clamp(13px,2.3vh,19px);line-height:1.1;}
  .aoe-h small{display:block;color:var(--dim);font-size:clamp(9px,1.5vh,12px);font-weight:500;margin-top:2px;}
  .aoe-btn{flex:1;min-height:0;border:3px solid var(--line);border-radius:12px;background:var(--panel);
    color:var(--txt);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    font-weight:900;font-size:clamp(17px,3.4vh,30px);}
  .aoe-btn svg{width:clamp(28px,5.6vh,52px);height:clamp(28px,5.6vh,52px);}
  .progress{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;}
  .pcell{min-height:5.2vh;border:2px solid var(--line);border-radius:7px;background:var(--panel);
    color:var(--txt);font-size:clamp(11px,1.9vh,15px);font-weight:800;cursor:pointer;padding:1px;}
  .pcell.aoe{border-color:var(--aoe);} .pcell.soak{border-color:var(--soak);}
  .pcell.pad{border-color:var(--pad);color:var(--dim);} .pcell.set{background:var(--panel2);}
  .pcell.cur{box-shadow:0 0 0 3px #fff inset;background:var(--panel2);color:var(--txt);}
  .read-label{font-size:clamp(13px,2.3vh,18px);font-weight:800;color:var(--cone);text-align:center;}
  .pick{flex:1;min-height:0;display:flex;flex-direction:column;gap:7px;}
  .pick-btn{flex:1;min-height:0;border:3px solid var(--line);border-radius:13px;background:var(--panel);
    color:var(--txt);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:14px;
    font-size:clamp(22px,5vh,40px);font-weight:900;}
  .pick-btn svg{width:clamp(38px,8vh,72px);height:clamp(38px,8vh,72px);flex:none;}
  .pick-btn.next{border-color:var(--next);background:#13283f;}
  .bignote{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;text-align:center;
    border:2px dashed var(--line);border-radius:13px;color:var(--soak);font-weight:900;font-size:clamp(18px,4vh,28px);}
  .reset button{width:100%;border:3px solid #6a4a2a;border-radius:14px;background:#241a10;
    color:#f2cf8a;cursor:pointer;min-height:7vh;font-size:clamp(16px,3vh,26px);font-weight:900;}
  .rhead{display:flex;flex-direction:column;}
  .rhead b{font-size:clamp(16px,3vh,26px);}
  .rhead span{font-size:clamp(11px,1.9vh,16px);color:var(--dim);margin-top:2px;}
  .rgo{display:flex;align-items:center;gap:14px;}
  .rgo-ic{width:clamp(44px,9vh,84px);height:clamp(44px,9vh,84px);flex:none;}
  .rgo-text{display:flex;flex-direction:column;min-width:0;}
  .rgo-shape{font-size:clamp(15px,2.4vh,22px);font-weight:800;}
  .rgo-go{font-size:clamp(24px,5.8vh,56px);font-weight:900;line-height:1.04;}
  .rgo-go .lbl{font-size:.42em;color:var(--dim);font-weight:700;margin-right:.2em;}
  .rgo-multi{display:flex;flex-direction:column;gap:5px;margin-top:3px;}
  .rgo-line{display:flex;align-items:center;gap:8px;font-size:clamp(19px,4.3vh,40px);font-weight:900;line-height:1.05;}
  .rgo-line .num{flex:none;width:1.25em;height:1.25em;border:2px solid var(--line);border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;font-size:.62em;color:var(--txt);background:var(--panel2);}
  .rgo-tag{font-size:.52em;color:var(--dim);font-weight:700;}
  .rdiagram{flex:1;min-height:0;}
  .rdiagram svg{width:100%;height:100%;display:block;}

  /* ===== 黑洞 ===== */
  .rgrps{flex:1;min-height:0;display:flex;flex-direction:column;gap:10px;}
  .rgrp{flex:1;min-height:0;display:flex;flex-direction:column;gap:5px;}
  .rgrp-h{font-size:clamp(13px,2.2vh,18px);font-weight:800;}
  .rgrp-btns{flex:1;min-height:0;display:flex;gap:8px;}
  .role-btn{flex:1;min-width:0;border:3px solid var(--line);border-radius:14px;background:var(--panel);
    color:var(--txt);cursor:pointer;font-size:clamp(20px,4.6vh,40px);font-weight:900;}
  .role-btn.on{box-shadow:0 0 0 3px #fff inset;}
  .bhead{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;}
  .bhead b{font-size:clamp(22px,4.8vh,44px);}
  .bhead span{font-size:clamp(12px,2.1vh,17px);color:var(--dim);font-weight:700;}
  .tl{flex:1;min-height:0;display:flex;flex-direction:column;gap:7px;}
  .tl-row{flex:1;min-height:0;display:flex;gap:8px;align-items:stretch;}
  .tl-rname{flex:none;width:clamp(60px,11vw,104px);display:flex;align-items:center;justify-content:center;
    border:2px solid var(--line);border-radius:11px;background:var(--panel2);
    font-size:clamp(18px,3.8vh,32px);font-weight:900;color:#9fb0c4;}
  .tl-row.active .tl-rname{border-color:#5a6b82;background:#26344a;color:#fff;}
  .tl-waves{flex:1;min-width:0;display:flex;gap:6px;}
  .wave{flex:1;min-width:0;border:2px solid var(--line);border-radius:10px;background:var(--panel);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:4px;text-align:center;}
  .wave .wv-h{font-size:clamp(11px,1.9vh,15px);color:var(--dim);font-weight:700;}
  .wave .wv-x{font-size:clamp(11px,1.9vh,15px);color:#566;font-weight:600;}
  .wave.catch{border-width:3px;}
  .wave.catch .wv-h{color:var(--txt);}
  .wave.catch .wv-g{font-size:clamp(16px,3.3vh,30px);font-weight:900;line-height:1.05;}
  .wave.catch .wv-n{font-size:clamp(10px,1.8vh,14px);color:var(--txt);font-weight:700;line-height:1.2;}
  .wave.hold{border-style:dashed;}
  .wave.hold .wv-g2{font-size:clamp(14px,2.9vh,24px);font-weight:800;}
  .wave.hold .wv-n{font-size:clamp(10px,1.7vh,13px);color:var(--dim);font-weight:600;}
  .wave.handoff{opacity:.78;}
  .wave.handoff .wv-g2{font-size:clamp(13px,2.7vh,21px);font-weight:800;color:#8a99ad;}
  .wave.handoff .wv-n{font-size:clamp(10px,1.7vh,13px);color:var(--dim);font-weight:600;}

  /* ===== P4 ===== */
  .p4grid{flex:1;min-height:0;display:flex;flex-direction:column;gap:5px;}
  .p4row{flex:1;min-height:0;display:flex;align-items:stretch;gap:7px;}
  .p4lbl{flex:none;width:clamp(40px,8vw,66px);display:flex;align-items:center;justify-content:center;
    font-size:clamp(12px,2.1vh,18px);font-weight:800;color:var(--dim);}
  .p4pair{flex:1;min-width:0;display:flex;gap:6px;}
  .p4btn{flex:1;min-width:0;border:2px solid var(--line);border-radius:10px;background:var(--panel);
    color:var(--txt);cursor:pointer;font-size:clamp(15px,2.9vh,25px);font-weight:800;padding:2px;}
  .p4btn.on{border-color:var(--gold);background:#3a3420;color:#ffe699;box-shadow:0 0 0 2px var(--gold) inset;}
  .p4out{flex:1;min-height:0;display:flex;flex-direction:column;gap:5px;}
  .p4line{flex:1;min-height:0;display:flex;align-items:center;gap:10px;border:2px solid var(--line);
    border-radius:10px;background:var(--panel);padding:4px 12px;}
  .p4line.filled{border-color:#46566c;background:var(--panel2);}
  .p4n{flex:none;width:1.5em;height:1.5em;border-radius:50%;background:var(--panel2);border:2px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:clamp(13px,2.2vh,18px);font-weight:800;color:var(--dim);}
  .p4cat{flex:none;width:clamp(28px,5vw,46px);font-size:clamp(11px,1.8vh,15px);color:var(--dim);font-weight:700;}
  .p4t{flex:1;min-width:0;font-size:clamp(20px,4.8vh,42px);font-weight:900;}
  .p4t.empty{color:#39434f;font-weight:600;font-size:clamp(14px,2.4vh,20px);}
  .p4suf{font-size:.58em;color:var(--dim);font-weight:700;}
  .p4me{flex:none;display:flex;align-items:center;gap:16px;border:3px solid var(--line);border-radius:13px;padding:6px 16px;min-height:13vh;}
  .p4me.wait{justify-content:center;text-align:center;color:var(--dim);font-size:clamp(16px,3.2vh,26px);font-weight:800;}
  .p4me.still{border-color:#4aa3ff;background:#10243b;}
  .p4me.move{border-color:#ff8a3c;background:#2e1d10;}
  .p4me-k{flex:none;font-size:clamp(40px,11vh,104px);font-weight:900;line-height:1;}
  .p4me.still .p4me-k{color:#7cc0ff;} .p4me.move .p4me-k{color:#ffac6b;}
  .p4me-d{font-size:clamp(14px,2.7vh,24px);font-weight:800;line-height:1.3;}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="ic-share" viewBox="0 0 100 100">
    <g fill="none" stroke="#4aa3ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <g><polyline points="33.9,24 50,38.3 66.1,24"/><polyline points="33.9,9.7 50,24 66.1,9.7"/></g>
      <g transform="rotate(90 50 50)"><polyline points="33.9,24 50,38.3 66.1,24"/><polyline points="33.9,9.7 50,24 66.1,9.7"/></g>
      <g transform="rotate(180 50 50)"><polyline points="33.9,24 50,38.3 66.1,24"/><polyline points="33.9,9.7 50,24 66.1,9.7"/></g>
      <g transform="rotate(270 50 50)"><polyline points="33.9,24 50,38.3 66.1,24"/><polyline points="33.9,9.7 50,24 66.1,9.7"/></g>
    </g>
  </symbol>
  <symbol id="ic-spread" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="26" fill="none" stroke="#ffd84a" stroke-width="8.5"/>
    <circle cx="50" cy="50" r="9" fill="#ffd84a"/>
  </symbol>
  <symbol id="ic-cone" viewBox="0 0 100 100">
    <path d="M50 78.6 L24 37 Q50 18.8 76 37 Z" fill="#ff8a3c" stroke="#c85a14" stroke-width="3" stroke-linejoin="round"/>
  </symbol>
</svg>

<div class="tabs">
  <button class="tab" data-mode="tower">踩塔</button>
  <button class="tab" data-mode="blackhole">黑洞接线</button>
  <button class="tab" data-mode="p4">P4 报点</button>
</div>
<div class="app">
  <div class="left" id="leftPanel"></div>
  <div class="right" id="rightPanel"></div>
</div>

<script>
/* ================= 踩塔数据 ================= */
const SOAK = {
  1:{'分摊':'右塔 · 上沿', '钢铁':'右塔 · 右下', '扇形':'左塔 · 左下'},
  2:{'钢铁':[{loc:'左塔 · 左下'},{loc:'右塔 · 右下'}], '扇形':[{loc:'左塔 · 中轴线顶部'},{loc:'右塔 · 中轴线顶部'}]},
  3:{'分摊':[{loc:'左塔 · 上沿（靠中）',tag:'接扇形'},{loc:'右塔 · 上沿'}], '钢铁':'右塔 · 右下', '扇形':'左塔 · 左下'},
  4:{'钢铁':'右塔 · 右下', '扇形':'右塔 · 中轴线顶部'},
  5:{'分摊':[{loc:'左塔 · 上沿（靠中）',tag:'接扇形'},{loc:'右塔 · 上沿'}], '钢铁':'右塔 · 右下', '扇形':'左塔 · 左下'},
  6:{'钢铁':[{loc:'左塔 · 左下'},{loc:'右塔 · 右下'}], '扇形':[{loc:'左塔 · 中轴线顶部'},{loc:'右塔 · 中轴线顶部'}]},
  7:{'分摊':[{loc:'左塔 · 上沿（靠中）',tag:'接扇形'},{loc:'右塔 · 上沿'}], '钢铁':'右塔 · 右下', '扇形':'左塔 · 左下'},
  8:{'钢铁':'右塔 · 右下', '扇形':'右塔 · 中轴线顶部'},
};
const SOAK_TOWERS={A:[1,2,3,8], B:[4,5,6,7]}, FINAL_SOAK={A:8,B:7}, FIRST_SOAK={A:1,B:4};
const READS={A:{0:1,1:2,2:3,3:8}, B:{0:4,4:5,5:6,6:7}};
const SHAPE={'分摊':{color:'#4aa3ff',sym:'ic-share'}, '钢铁':{color:'#ffd84a',sym:'ic-spread'}, '扇形':{color:'#ff8a3c',sym:'ic-cone'}};
const POS={
  '右塔 · 上沿':{x:320,y:138}, '右塔 · 右下':{x:349,y:224}, '左塔 · 左下':{x:131,y:224},
  '右塔 · 中轴线顶部':{x:320,y:152}, '左塔 · 中轴线顶部':{x:160,y:152}, '右塔 · 右边':{x:396,y:195},
  '右塔 · 上沿（塔外）':{x:320,y:108}, '左塔 · 上沿（靠中）':{x:188,y:146},
};
const isSoak=(g,t)=> g && SOAK_TOWERS[g].includes(t);
function padInfo(t){ return (t%2===0)?{action:'引导扇形',loc:'右塔 · 右边',shape:'扇形'}:{action:'处理分摊',loc:'右塔 · 上沿（塔外）',shape:'分摊'}; }
function positions(t,c){ const v=SOAK[t][c]; return Array.isArray(v)?v:[{loc:v,tag:''}]; }

/* ================= 黑洞数据 ================= */
const GROUPS=[
  {name:'攻击',color:'var(--atk)',roles:['攻击1','攻击2','攻击3']},
  {name:'锁链',color:'var(--chn)',roles:['锁链1','锁链2','锁链3']},
  {name:'禁止',color:'var(--ban)',roles:['禁止1','禁止2']},
];
const groupColor=r=>GROUPS.find(g=>g.roles.includes(r)).color;
const ROUNDS={1:[{w:1,lines:1},{w:2,lines:2}], 2:[{w:1,lines:3},{w:2,lines:1},{w:3,lines:1}],
  3:[{w:1,lines:3},{w:2,lines:1},{w:3,lines:1}], 4:[{w:1,lines:2},{w:2,lines:1}]};
const PLAN={
  std:{
    '攻击1':{1:{catch:{1:'接这1根',2:'换位·再接1根'}}, 2:{catch:{1:'3根·接1根'},handoffAt:2,takenBy:'锁链1'}},
    '攻击2':{1:{catch:{2:'2根·接1根'}}, 2:{catch:{1:'3根·接1根'},handoffAt:3,takenBy:'锁链2'}},
    '攻击3':{2:{catch:{1:'3根·接1根'},toEnd:true}},
    '锁链1':{2:{catch:{2:'接「攻击1」的线'},toEnd:true}, 3:{catch:{1:'3根·接1根'},handoffAt:2,takenBy:'禁止1'}},
    '锁链2':{2:{catch:{3:'接「攻击2」的线'},toEnd:true}, 3:{catch:{1:'3根·接1根'},handoffAt:3,takenBy:'禁止2'}},
    '锁链3':{3:{catch:{1:'3根·接1根'},toEnd:true}},
    '禁止1':{3:{catch:{2:'接「锁链1」的线'},toEnd:true}, 4:{catch:{1:'2根·接1根'}}},
    '禁止2':{3:{catch:{3:'接「锁链2」的线'},toEnd:true}, 4:{catch:{1:'2根·接1根',2:'再接这1根'}}},
  },
};
const planOf=role=>PLAN.std[role];
function waveStatus(rd,w,lastW){
  if(!rd) return 'none';
  const cw=Object.keys(rd.catch).map(Number), minC=Math.min(...cw);
  if(rd.catch[w]!=null) return 'catch';
  if(rd.handoffAt===w) return 'handoff';
  if(rd.handoffAt!=null) return (w>minC && w<rd.handoffAt)?'hold':'none';
  return (rd.toEnd && w>minC && w<=lastW)?'hold':'none';
}

/* ================= P4 数据（移植 P4Callouts.py） ================= */
/* 剑: 真=静剑(雷出·背对), 假=动剑(水出·面对) */
const P4BTN={
  my1:{label:'1动静'}, my2:{label:'2动静'},
  A:{label:'真',out:'雷出',sec:'背对',sword:'静'}, B:{label:'假',out:'水出',sec:'面对',sword:'动'},
  C:{label:'短'}, D:{label:'长'},
  E:{label:'真',out:'雷出',sec:'背对',sword:'静'}, F:{label:'假',out:'水出',sec:'面对',sword:'动'},
  zh:{label:'真',out:'放置钢铁 出'}, jh:{label:'假',out:'放置月环 留'},
  zs:{label:'真',out:'放置月环 留'}, js:{label:'假',out:'放置钢铁 出'},
  zl:{label:'真'}, jl:{label:'假'}, zl2:{label:'真'}, jl2:{label:'假'},
  zb:{label:'真'}, jb:{label:'假'}, zb2:{label:'真'}, jb2:{label:'假'},
};
const P4ROWS=[
  {label:'我的剑',pair:['my1','my2']},
  {label:'1动静',pair:['A','B']}, {label:'一水雷',pair:['C','D']}, {label:'2动静',pair:['E','F']},
  {label:'火',pair:['zh','jh']}, {label:'水',pair:['zs','js']},
  {label:'雷①',pair:['zl','jl']}, {label:'雷②',pair:['zl2','jl2']},
  {label:'冰①',pair:['zb','jb']}, {label:'冰②',pair:['zb2','jb2']},
];
const P4PARTNER={}; P4ROWS.forEach(r=>{ P4PARTNER[r.pair[0]]=r.pair[1]; P4PARTNER[r.pair[1]]=r.pair[0]; });
function swordOut(id){ return P4BTN[id].out+' <span class="p4suf">+'+P4BTN[id].sword+'剑</span>'; }
function p4Output(){
  const sel=P.sel, pick=(a,b)=> sel[a]?a:(sel[b]?b:null);
  const lines=['','','','','','',''];           // index 0..6 = 行 1..7
  const ab=pick('A','B'), zhjh=pick('zh','jh'), zsjs=pick('zs','js'), ef=pick('E','F');
  const l1=pick('zl','jl'), l2=pick('zl2','jl2'), i1=pick('zb','jb'), i2=pick('zb2','jb2');
  if(zhjh) lines[2]=P4BTN[zhjh].out;
  if(zsjs) lines[5]=P4BTN[zsjs].out;
  if(sel.C){ if(ab){ lines[0]=swordOut(ab); lines[1]=P4BTN[ab].sec; } if(ef){ lines[3]=swordOut(ef); lines[4]=P4BTN[ef].sec; } }
  if(sel.D){ if(ab){ lines[3]=swordOut(ab); lines[1]=P4BTN[ab].sec; } if(ef){ lines[0]=swordOut(ef); lines[4]=P4BTN[ef].sec; } }
  let lr='', ir='';
  if(l1&&l2) lr = ((l1==='zl')===(l2==='zl2')) ? '真雷':'假雷';
  if(i1&&i2) ir = ((i1==='zb')===(i2==='zb2')) ? '真冰':'假冰';
  if(lr&&ir) lines[6]=ir+lr;
  return lines;
}
function p4MyState(){
  const sel=P.sel, my = sel.my1?1:(sel.my2?2:null);
  if(!my) return {my:null};
  const pr = my===1?['A','B']:['E','F'], pk = sel[pr[0]]?pr[0]:(sel[pr[1]]?pr[1]:null);
  if(!pk) return {my, sword:null};
  return {my, sword:P4BTN[pk].sword, tf:(pk===pr[0]?'真':'假'), out:P4BTN[pk].out, sec:P4BTN[pk].sec};
}
function p4toggle(id){ const p=P4PARTNER[id]; if(P.sel[id]){ delete P.sel[id]; } else { if(p) delete P.sel[p]; P.sel[id]=true; } }

/* ================= 状态 + 主渲染 ================= */
let mode = location.hash==='#bh' ? 'blackhole' : location.hash==='#p4' ? 'p4' : 'tower';
const T = {group:null, cursor:0, picks:{}};
const B = {role:null};
const P = {sel:{}};
const $ = s=>document.querySelector(s);

function render(){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on', t.dataset.mode===mode));
  if(mode==='tower') renderTower(); else if(mode==='blackhole') renderBlackhole(); else renderP4();
}

/* ---- 踩塔 ---- */
function renderTower(){
  const g=T.group, c=T.cursor; let C='', R='';
  if(c===0){
    C='<div class="brand">P2 遗弃末世 · 踩塔 ｜ 1238 近远分组</div>'
     +'<div class="read-label">开局 AOE：点初始点名（自动定组）</div>'
     +'<div class="aoe-pick">'+aoeCol('A')+aoeCol('B')+'</div>';
    R='<div class="rhead"><b>开场 AOE</b><span>右侧：左列分摊组 / 右列闲人组，点你的初始点名 → 一步定组+定位</span></div>'
     +'<div class="hint">在右侧选「你的组 + 初始点名」 →</div>';
  } else {
    C='<div class="brand">'+(g==='A'?'分摊组（踩 1·2·3·8）':'闲人组（踩 4·5·6·7）')+'</div>'+progressHtml();
    if(c===8){ C+='<div class="pick"><div class="bignote">✅ 已是最后一塔</div></div>'; }
    else{ const target=READS[g][c];
      if(target!==undefined){ C+='<div class="read-label">读新点名 → 塔'+target+'</div>'+pickHtml(target); }
      else{ C+='<div class="read-label">塔'+c+' · '+(isSoak(g,c)?'踩塔（最后一座·无新点名）':'垫场')+'</div>'
             +'<div class="pick"><button class="pick-btn next" data-act="next">下一塔 ▶</button></div>'; } }
    C+='<div class="reset"><button data-act="reset">↺ 重新开始</button></div>';
    const t=c, isFinal=(FINAL_SOAK[g]===t);
    if(isSoak(g,t)){ const pick=T.picks[t];
      if(pick){ const arr=positions(t,pick), dual=arr.length>1;
        R='<div class="rhead"><b>塔'+t+' · 踩塔'+(isFinal?'（最后一座）':'')+'</b>'
          +(dual?'<span>左1右2 · 1号去左塔①、2号去右塔②</span>':(isFinal?'<span>用最近读到的点名</span>':''))+'</div>'+resultHtml(pick,arr);
      } else { R='<div class="rhead"><b>塔'+t+' · 踩塔</b></div><div class="hint">这座点名还没读<br>点进度条回去补读</div>'; }
    } else { const p=padInfo(t); R='<div class="rhead"><b>塔'+t+' · 垫场</b><span>'+p.action+'</span></div>'+resultHtml(p.shape,[{loc:p.loc,tag:''}]); }
  }
  $('#rightPanel').innerHTML=C; $('#leftPanel').innerHTML=R;
}
function aoeCol(g){
  const target=FIRST_SOAK[g], name=(g==='A'?'分摊组':'闲人组'), sub=(g==='A'?'踩 1·2·3·8':'踩 4·5·6·7');
  let h='<div class="aoe-col"><div class="aoe-h" style="color:'+(g==='A'?'#4aa3ff':'#ff8a3c')+'">'+name+'<small>'+sub+'</small></div>';
  Object.keys(SOAK[target]).forEach(nm=>{ const sh=SHAPE[nm];
    h+='<button class="aoe-btn" data-g="'+g+'" data-target="'+target+'" data-cb="'+nm+'" style="border-color:'+sh.color+'">'
      +'<svg viewBox="0 0 100 100"><use href="#'+sh.sym+'"/></svg><span style="color:'+sh.color+'">'+nm+'</span></button>'; });
  return h+'</div>';
}
function progressHtml(){
  const g=T.group; let h='<div class="progress">';
  ['AOE','1','2','3','4','5','6','7','8'].forEach((txt,k)=>{
    let cls='pcell '+(k===0?'aoe':(isSoak(g,k)?'soak':'pad'));
    if(k>0 && isSoak(g,k) && T.picks[k]) cls+=' set';
    if(k===T.cursor) cls+=' cur';
    h+='<button class="'+cls+'" data-cursor="'+k+'">'+txt+'</button>';
  });
  return h+'</div>';
}
function pickHtml(target){
  let h='<div class="pick">';
  Object.keys(SOAK[target]).forEach(name=>{ const sh=SHAPE[name], on=(T.picks[target]===name)?' on':'';
    h+='<button class="pick-btn'+on+'" data-target="'+target+'" data-cb="'+name+'" style="border-color:'+sh.color+'">'
      +'<svg viewBox="0 0 100 100"><use href="#'+sh.sym+'"/></svg><span style="color:'+sh.color+'">'+name+'</span></button>'; });
  return h+'</div>';
}
function resultHtml(shape, arr){
  const sh=SHAPE[shape]; let txt;
  if(arr.length===1){ txt='<div class="rgo-go"><span class="lbl">去</span><span style="color:'+sh.color+'">'+arr[0].loc+'</span>'
      +(arr[0].tag?' <span class="rgo-tag">'+arr[0].tag+'</span>':'')+'</div>'; }
  else{ txt='<div class="rgo-multi">'; arr.forEach((p,i)=>{ txt+='<div class="rgo-line"><span class="num">'+(i+1)+'</span>'
      +'<span style="color:'+sh.color+'">'+p.loc+'</span>'+(p.tag?' <span class="rgo-tag">'+p.tag+'</span>':'')+'</div>'; }); txt+='</div>'; }
  return '<div class="rgo"><svg class="rgo-ic" viewBox="0 0 100 100"><use href="#'+sh.sym+'"/></svg>'
    +'<div class="rgo-text"><div class="rgo-shape" style="color:'+sh.color+'">'+shape+'</div>'+txt+'</div></div>'
    +'<div class="rdiagram">'+diagram(arr,shape)+'</div>';
}
function diagram(arr, shape){
  const sh=SHAPE[shape];
  const tower=(cx,cy,name)=>'<circle cx="'+cx+'" cy="'+cy+'" r="58" fill="rgba(90,170,255,0.06)" stroke="#3a4d63" stroke-width="3"/>'
    +'<text x="'+cx+'" y="'+(cy+6)+'" text-anchor="middle" fill="#6b7a8d" font-size="20" font-weight="700">'+name+'</text>';
  let mk='';
  arr.forEach((pp,i)=>{ const p=POS[pp.loc]; if(!p) return;
    mk+='<circle cx="'+p.x+'" cy="'+p.y+'" r="30" fill="rgba(255,255,255,0.10)"/>'
      +'<circle cx="'+p.x+'" cy="'+p.y+'" r="26" fill="none" stroke="'+sh.color+'" stroke-width="5">'
      +'<animate attributeName="r" values="22;34;22" dur="1.1s" repeatCount="indefinite"/>'
      +'<animate attributeName="opacity" values="1;0.25;1" dur="1.1s" repeatCount="indefinite"/></circle>'
      +'<use href="#'+sh.sym+'" x="'+(p.x-20)+'" y="'+(p.y-20)+'" width="40" height="40"/>';
    if(arr.length>1){ mk+='<circle cx="'+(p.x+24)+'" cy="'+(p.y-24)+'" r="13" fill="#0c0f14" stroke="'+sh.color+'" stroke-width="2.5"/>'
      +'<text x="'+(p.x+24)+'" y="'+(p.y-23)+'" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="17" font-weight="800">'+(i+1)+'</text>'; }
  });
  return '<svg viewBox="0 0 450 300" preserveAspectRatio="xMidYMid meet">'
    +'<circle cx="225" cy="46" r="24" fill="#4d2a63" stroke="#b06bff" stroke-width="3"/>'
    +'<text x="225" y="51" text-anchor="middle" fill="#e9d3ff" font-size="15" font-weight="700">BOSS</text>'
    +tower(160,195,'左塔')+tower(320,195,'右塔')+mk+'</svg>';
}

/* ---- 黑洞 ---- */
function renderBlackhole(){
  let C='<div class="brand">黑洞接线 · 选号位｜接线后持线到「被接走 / 本轮结束」（跨轮重置）</div><div class="rgrps">';
  GROUPS.forEach(g=>{ C+='<div class="rgrp"><div class="rgrp-h" style="color:'+g.color+'">'+g.name+'</div><div class="rgrp-btns">';
    g.roles.forEach(r=>{ const on=B.role===r;
      C+='<button class="role-btn'+(on?' on':'')+'" data-role="'+r+'" style="border-color:'+g.color+(on?';background:'+g.color+'22':'')+'">'+r+'</button>'; });
    C+='</div></div>'; });
  C+='</div>';
  let R;
  if(!B.role){ R='<div class="hint">在右侧选你的号位<br>→ 显示你每轮接线 + 持线到哪一刻</div>'; }
  else{
    const plan=planOf(B.role), col=groupColor(B.role);
    const rds=Object.keys(plan).map(Number).sort((a,b)=>a-b);
    R='<div class="bhead"><b style="color:'+col+'">'+B.role+'</b><span>接线轮：第 '+rds.join('·')+' 轮</span></div><div class="tl">';
    for(let r=1;r<=4;r++){ const rd=plan[r], waves=ROUNDS[r], lastW=waves[waves.length-1].w;
      R+='<div class="tl-row'+(rd?' active':'')+'"><div class="tl-rname">第'+r+'轮</div><div class="tl-waves">';
      waves.forEach(wv=>{ const st=waveStatus(rd,wv.w,lastW);
        if(st==='catch'){ R+='<div class="wave catch" style="border-color:'+col+';background:'+col+'26">'
            +'<div class="wv-h" style="color:'+col+'">第'+wv.w+'次</div><div class="wv-g" style="color:'+col+'">接线</div>'
            +'<div class="wv-n">'+rd.catch[wv.w]+'</div></div>'; }
        else if(st==='hold'){ R+='<div class="wave hold" style="border-color:'+col+'99"><div class="wv-h">第'+wv.w+'次</div>'
            +'<div class="wv-g2" style="color:'+col+'">保持</div><div class="wv-n">'+(wv.w===lastW?'持到本轮结束':'持线中')+'</div></div>'; }
        else if(st==='handoff'){ R+='<div class="wave handoff"><div class="wv-h">第'+wv.w+'次</div>'
            +'<div class="wv-g2">交出</div><div class="wv-n">「'+rd.takenBy+'」接走</div></div>'; }
        else{ R+='<div class="wave"><div class="wv-h">第'+wv.w+'次</div><div class="wv-x">'+wv.lines+'根</div></div>'; }
      });
      R+='</div></div>';
    }
    R+='</div>';
  }
  $('#rightPanel').innerHTML=C; $('#leftPanel').innerHTML=R;
}

/* ---- P4 ---- */
function renderP4(){
  let C='<div class="brand">P4 报点 · 每组二选一（再点取消）</div><div class="p4grid">';
  P4ROWS.forEach(row=>{
    C+='<div class="p4row"><div class="p4lbl">'+row.label+'</div><div class="p4pair">';
    row.pair.forEach(id=>{ const on=P.sel[id]?' on':'';
      C+='<button class="p4btn'+on+'" data-p4="'+id+'">'+P4BTN[id].label+'</button>'; });
    C+='</div></div>';
  });
  C+='</div><div class="reset"><button data-act="p4reset">↺ 重置</button></div>';
  // 左：我的动静大提示 + 7 行
  const ms=p4MyState();
  let banner;
  if(!ms.my){ banner='<div class="p4me wait">先在右侧选「我的剑」(1动静 / 2动静)</div>'; }
  else if(!ms.sword){ banner='<div class="p4me wait">再选「'+ms.my+'动静」是 真 还是 假</div>'; }
  else{ banner='<div class="p4me '+(ms.sword==='静'?'still':'move')+'"><span class="p4me-k">'+ms.sword+'</span>'
      +'<span class="p4me-d">'+ms.my+'动静 · '+ms.tf+' → '+ms.sword+'剑<br>'+ms.out+' · '+ms.sec+'</span></div>'; }
  const lines=p4Output(), cat=['出','面向','火','出','面向','水','冰雷'];
  let R=banner+'<div class="p4out">';
  lines.forEach((t,i)=>{
    R+='<div class="p4line'+(t?' filled':'')+'"><span class="p4n">'+(i+1)+'</span>'
      +'<span class="p4cat">'+cat[i]+'</span>'
      +'<span class="p4t'+(t?'':' empty')+'">'+(t||'—')+'</span></div>';
  });
  R+='</div>';
  $('#rightPanel').innerHTML=C; $('#leftPanel').innerHTML=R;
}

/* ================= 事件 ================= */
document.addEventListener('click', e=>{
  const tab=e.target.closest('[data-mode]'); if(tab){ mode=tab.dataset.mode; render(); return; }
  // 踩塔
  const pk=e.target.closest('[data-cb]');
  if(pk){ if(pk.dataset.g){ T.group=pk.dataset.g; T.picks={}; } T.picks[+pk.dataset.target]=pk.dataset.cb; T.cursor=Math.min(8,T.cursor+1); render(); return; }
  const nx=e.target.closest('[data-act="next"]'); if(nx){ T.cursor=Math.min(8,T.cursor+1); render(); return; }
  const pc=e.target.closest('[data-cursor]');     if(pc){ T.cursor=+pc.dataset.cursor; render(); return; }
  const rs=e.target.closest('[data-act="reset"]'); if(rs){ T.cursor=0; T.picks={}; render(); return; }
  // 黑洞
  const rb=e.target.closest('[data-role]'); if(rb){ B.role=rb.dataset.role; render(); return; }
  // P4
  const p4=e.target.closest('[data-p4]'); if(p4){ p4toggle(p4.dataset.p4); render(); return; }
  const p4r=e.target.closest('[data-act="p4reset"]'); if(p4r){ P.sel={}; render(); return; }
});
render();
</script>
</body>
</html>
