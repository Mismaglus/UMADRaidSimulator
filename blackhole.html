<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>黑洞接线助手</title>
<style>
  :root{
    --bg:#0c0f14; --panel:#161b24; --panel2:#1d2533; --line:#2b3545;
    --txt:#e8eef6; --dim:#8a99ad;
    --atk:#e0654a; --chn:#4aa3ff; --ban:#c77dff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
    font-family:system-ui,"Microsoft YaHei",sans-serif;}
  .app{display:flex;height:100vh;gap:8px;padding:8px;}
  .res{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px;min-height:0;}
  .ctrl{width:40%;max-width:440px;display:flex;flex-direction:column;gap:8px;min-height:0;}
  .brand{font-size:clamp(11px,1.9vh,15px);color:var(--dim);font-weight:700;}

  .rgrp{display:flex;flex-direction:column;gap:4px;}
  .rgrp-h{font-size:clamp(12px,2vh,16px);font-weight:800;}
  .rgrp-btns{display:flex;gap:7px;}
  .role-btn{flex:1;min-height:7vh;border:3px solid var(--line);border-radius:12px;background:var(--panel);
    color:var(--txt);cursor:pointer;font-size:clamp(18px,3.6vh,30px);font-weight:900;}
  .role-btn.on{box-shadow:0 0 0 3px #fff inset;}

  .vtog{display:flex;align-items:center;gap:7px;margin-top:2px;}
  .vtog .vt-h{font-size:clamp(12px,2vh,16px);color:var(--dim);font-weight:700;flex:none;}
  .vbtn{flex:1;min-height:6vh;border:2px solid var(--line);border-radius:11px;background:var(--panel);
    color:var(--txt);cursor:pointer;font-size:clamp(15px,2.8vh,22px);font-weight:800;}
  .vbtn.on{border-color:#2ea043;background:#11331f;box-shadow:0 0 0 2px #2ea043 inset;}
  .vnote{font-size:clamp(10px,1.7vh,13px);color:var(--dim);line-height:1.4;}
  /* 跳回踩塔页（常驻底部） */
  .navbtn{margin-top:auto;display:flex;align-items:center;justify-content:center;width:100%;min-height:7.5vh;
    border:3px solid #2ea043;border-radius:13px;background:#11271a;color:#bdf0cd;
    font-size:clamp(16px,3vh,25px);font-weight:900;text-decoration:none;cursor:pointer;}

  .rhead{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;}
  .rhead b{font-size:clamp(22px,4.6vh,42px);}
  .rhead span{font-size:clamp(11px,2vh,16px);color:var(--dim);font-weight:700;}

  .tl{flex:1;min-height:0;display:flex;flex-direction:column;gap:6px;}
  .tl-row{flex:1;min-height:0;display:flex;gap:8px;align-items:stretch;}
  .tl-rname{flex:none;width:clamp(46px,7vw,72px);display:flex;align-items:center;justify-content:center;
    border:2px solid var(--line);border-radius:10px;background:var(--panel);
    font-size:clamp(13px,2.4vh,19px);font-weight:900;color:var(--dim);}
  .tl-row.active .tl-rname{color:var(--txt);}
  .tl-waves{flex:1;min-width:0;display:flex;gap:6px;}
  .wave{flex:1;min-width:0;border:2px solid var(--line);border-radius:10px;background:var(--panel);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:4px;text-align:center;}
  .wave .wv-h{font-size:clamp(11px,1.9vh,15px);color:var(--dim);font-weight:700;}
  .wave .wv-x{font-size:clamp(11px,1.9vh,15px);color:#566;font-weight:600;}
  .wave.catch{border-width:3px;}
  .wave.catch .wv-h{color:var(--txt);}
  .wave.catch .wv-g{font-size:clamp(16px,3.3vh,30px);font-weight:900;line-height:1.05;}
  .wave.catch .wv-n{font-size:clamp(10px,1.8vh,14px);color:var(--txt);font-weight:700;line-height:1.2;}
  .wave.hold{border-style:dashed;}
  .wave.hold .wv-g2{font-size:clamp(14px,2.9vh,24px);font-weight:800;}
  .wave.hold .wv-n{font-size:clamp(10px,1.7vh,13px);color:var(--dim);font-weight:600;}
  .wave.handoff{opacity:.78;}
  .wave.handoff .wv-g2{font-size:clamp(13px,2.7vh,21px);font-weight:800;color:#8a99ad;}
  .wave.handoff .wv-n{font-size:clamp(10px,1.7vh,13px);color:var(--dim);font-weight:600;}

  .hint{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;text-align:center;
    border:2px dashed var(--line);border-radius:13px;color:var(--dim);
    font-size:clamp(18px,4vh,30px);font-weight:800;line-height:1.5;}
</style>
</head>
<body>
<div class="app">
  <div class="res" id="res"></div>
  <div class="ctrl" id="ctrl"></div>
</div>

<script>
const GROUPS = [
  {name:'攻击', color:'var(--atk)', roles:['攻击1','攻击2','攻击3']},
  {name:'锁链', color:'var(--chn)', roles:['锁链1','锁链2','锁链3']},
  {name:'禁止', color:'var(--ban)', roles:['禁止1','禁止2']},
];
const groupColor = r => GROUPS.find(g=>g.roles.includes(r)).color;
/* 每轮每次的线数 */
const ROUNDS = {
  1:[{w:1,lines:1},{w:2,lines:2}],
  2:[{w:1,lines:3},{w:2,lines:1},{w:3,lines:1}],
  3:[{w:1,lines:3},{w:2,lines:1},{w:3,lines:1}],
  4:[{w:1,lines:2},{w:2,lines:1}],
};
/* 号位 → 每轮持线: {轮:{catch:{次:该次备注}, toEnd:持到本轮结束?, handoffAt:被接走的次, takenBy:谁接走}} */
const PLAN = {
  std:{
    '攻击1':{1:{catch:{1:'接这1根',2:'换位·再接1根'}}, 2:{catch:{1:'3根·接1根'},handoffAt:2,takenBy:'锁链1'}},
    '攻击2':{1:{catch:{2:'2根·接1根'}}, 2:{catch:{1:'3根·接1根'},handoffAt:3,takenBy:'锁链2'}},
    '攻击3':{2:{catch:{1:'3根·接1根'},toEnd:true}},
    '锁链1':{2:{catch:{2:'接「攻击1」的线'},toEnd:true}, 3:{catch:{1:'3根·接1根'},handoffAt:2,takenBy:'禁止1'}},
    '锁链2':{2:{catch:{3:'接「攻击2」的线'},toEnd:true}, 3:{catch:{1:'3根·接1根'},handoffAt:3,takenBy:'禁止2'}},
    '锁链3':{3:{catch:{1:'3根·接1根'},toEnd:true}},
    '禁止1':{3:{catch:{2:'接「锁链1」的线'},toEnd:true}, 4:{catch:{1:'2根·接1根'}}},
    '禁止2':{3:{catch:{3:'接「锁链2」的线'},toEnd:true}, 4:{catch:{1:'2根·接1根',2:'再接这1根'}}},
  },
  var:{   // 变体：仅 攻击1·2 / 禁止1·2 不同（R1/R4 接完即解除，不持整轮）
    '攻击1':{1:{catch:{2:'两根都你接'}}, 2:{catch:{1:'3根·接1根'},handoffAt:2,takenBy:'锁链1'}},
    '攻击2':{1:{catch:{1:'接这1根'},handoffAt:2,takenBy:'攻击1'}, 2:{catch:{1:'3根·接1根'},handoffAt:3,takenBy:'锁链2'}},
    '禁止1':{3:{catch:{2:'接「锁链1」的线'},toEnd:true}, 4:{catch:{2:'只接这1根'}}},
    '禁止2':{3:{catch:{3:'接「锁链2」的线'},toEnd:true}, 4:{catch:{1:'两根都你接'}}},
  },
};
const planOf = (role,variant)=> (variant && PLAN.var[role]) ? PLAN.var[role] : PLAN.std[role];

/* 某轮某次，该号位的状态: catch接线 / hold保持 / handoff被接走 / none不涉及 */
function waveStatus(rd, w, lastW){
  if(!rd) return 'none';
  const cw=Object.keys(rd.catch).map(Number), minC=Math.min(...cw);
  if(rd.catch[w]!=null) return 'catch';
  if(rd.handoffAt===w) return 'handoff';
  if(rd.handoffAt!=null) return (w>minC && w<rd.handoffAt) ? 'hold' : 'none';
  return (rd.toEnd && w>minC && w<=lastW) ? 'hold' : 'none';   // 仅 toEnd 才持到本轮结束；否则接完即解除
}

const state = {role:null, variant:false};
const $ = s=>document.querySelector(s);

function render(){
  /* ---- 右：选号位 ---- */
  let C='<div class="brand">黑洞接线助手 · 选号位 → 看你每轮接/持哪几根线</div>';
  GROUPS.forEach(g=>{
    C+='<div class="rgrp"><div class="rgrp-h" style="color:'+g.color+'">'+g.name+'</div><div class="rgrp-btns">';
    g.roles.forEach(r=>{ const on=state.role===r;
      C+='<button class="role-btn'+(on?' on':'')+'" data-role="'+r+'" style="border-color:'+g.color+(on?';background:'+g.color+'22':'')+'">'+r+'</button>'; });
    C+='</div></div>';
  });
  C+='<div class="vtog"><span class="vt-h">接法</span>'
    +'<button class="vbtn'+(!state.variant?' on':'')+'" data-var="0">标准</button>'
    +'<button class="vbtn'+(state.variant?' on':'')+'" data-var="1">变体</button></div>'
    +'<div class="vnote">同一轮内：接线后要<b style="color:#e8eef6">持线</b>，直到被别人接走或本轮结束（跨轮重置）。变体：攻击1·2、禁止1·2 换接法（少跑·需记忆）。</div>'
    +'<a class="navbtn" href="p2.html">去踩塔助手 →</a>';
  $('#ctrl').innerHTML=C;

  /* ---- 左：持线表 ---- */
  let R;
  if(!state.role){
    R='<div class="hint">在右侧选你的号位<br>→ 显示你每轮接线 + 持线到哪一刻</div>';
  } else {
    const plan=planOf(state.role,state.variant), col=groupColor(state.role);
    const affected=state.variant && PLAN.var[state.role];
    const rds=Object.keys(plan).map(Number).sort((a,b)=>a-b);
    R='<div class="rhead"><b style="color:'+col+'">'+state.role+'</b>'
     +'<span>接线轮：第 '+rds.join('·')+' 轮 · 接后持线到「被接走 / 本轮结束」'
     +(affected?' · 变体':(state.variant?' · 变体不影响此号位':''))+'</span></div><div class="tl">';
    for(let r=1;r<=4;r++){
      const rd=plan[r], waves=ROUNDS[r], lastW=waves[waves.length-1].w;
      R+='<div class="tl-row'+(rd?' active':'')+'"><div class="tl-rname">第'+r+'轮</div><div class="tl-waves">';
      waves.forEach(wv=>{
        const st=waveStatus(rd,wv.w,lastW);
        if(st==='catch'){
          R+='<div class="wave catch" style="border-color:'+col+';background:'+col+'26">'
            +'<div class="wv-h" style="color:'+col+'">第'+wv.w+'次</div>'
            +'<div class="wv-g" style="color:'+col+'">接线</div>'
            +'<div class="wv-n">'+rd.catch[wv.w]+'</div></div>';
        } else if(st==='hold'){
          R+='<div class="wave hold" style="border-color:'+col+'99">'
            +'<div class="wv-h">第'+wv.w+'次</div>'
            +'<div class="wv-g2" style="color:'+col+'">保持</div>'
            +'<div class="wv-n">'+(wv.w===lastW?'持到本轮结束':'持线中')+'</div></div>';
        } else if(st==='handoff'){
          R+='<div class="wave handoff"><div class="wv-h">第'+wv.w+'次</div>'
            +'<div class="wv-g2">交出</div><div class="wv-n">「'+rd.takenBy+'」接走</div></div>';
        } else {
          R+='<div class="wave"><div class="wv-h">第'+wv.w+'次</div><div class="wv-x">'+wv.lines+'根</div></div>';
        }
      });
      R+='</div></div>';
    }
    R+='</div>';
  }
  $('#res').innerHTML=R;
}

document.addEventListener('click', e=>{
  const rb=e.target.closest('[data-role]'); if(rb){ state.role=rb.dataset.role; render(); return; }
  const vb=e.target.closest('[data-var]');  if(vb){ state.variant=vb.dataset.var==='1'; render(); return; }
});
render();
</script>
</body>
</html>
